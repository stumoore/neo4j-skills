name: Skill Lint

on:
  pull_request:
    paths:
      - '**-skill/SKILL.md'
      - 'scripts/lint_skills.py'
  push:
    branches: [main]
    paths:
      - '**-skill/SKILL.md'
      - 'scripts/lint_skills.py'

jobs:
  lint:
    name: Lint SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run frontmatter linter
        run: python scripts/lint_skills.py
