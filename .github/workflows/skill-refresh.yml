name: Neo4j Skills Refresh

on:
  workflow_dispatch:           # run manually from Actions tab
  schedule:
    - cron: '0 8 * * 1'       # every Monday 08:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh skills against Neo4j release notes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create refresh branch
        id: branch
        run: |
          BRANCH="skill-refresh/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run skill refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude \
            --print \
            --allowedTools "Bash,WebFetch,Read,Edit,Write" \
            --max-turns 200 \
            "$(cat .github/prompts/skill-refresh.md)" \
            | tee /tmp/refresh-summary.txt

      - name: Lint skills
        run: |
          # Stage new/modified skill files so linter sees them
          git add $(git ls-files --modified --others --exclude-standard \
            | grep -E '^neo4j-.*-skill/') || true
          python3 scripts/lint_skills.py

      - name: Check for changes
        id: changes
        run: |
          git diff --cached --quiet && git diff --quiet \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only tracked skill files and the prompt itself
          git add $(git ls-files --modified --others --exclude-standard \
            | grep -E '^neo4j-.*-skill/|^\.github/prompts/') || true
          git commit -m "skill-refresh: update skills against Neo4j release notes $(date +%Y-%m-%d)"

      - name: Push branch
        if: steps.changes.outputs.changed == 'true'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Extract summary for PR body
        if: steps.changes.outputs.changed == 'true'
        id: summary
        run: |
          # Extract the summary block printed by Claude
          SUMMARY=$(sed -n '/^<!-- SUMMARY_START -->/,$ p' /tmp/refresh-summary.txt \
            | tail -n +2 | head -60)
          # Write to file to avoid quoting issues
          echo "$SUMMARY" > /tmp/pr-body.txt
          cat >> /tmp/pr-body.txt << 'EOF'

          ---
          🤖 Generated by [skill-refresh workflow](.github/workflows/skill-refresh.yml) using [Claude Code](https://claude.ai/code)
          EOF

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "skill-refresh: Neo4j release notes scan $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.txt \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --label "skill-refresh,automated"

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No skill updates required — all skills current."
