name: Neo4j Skills Refresh

on:
  workflow_dispatch:           # run manually from Actions tab
  schedule:
    - cron: '0 8 * * 1'       # every Monday 08:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh skills against Neo4j release notes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create refresh branch
        id: branch
        run: |
          BRANCH="skill-refresh/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Verify API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "ANTHROPIC_API_KEY secret not set"; exit 1; }
          echo "API key present (${#ANTHROPIC_API_KEY} chars)"

      - name: Run skill refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat .github/prompts/skill-refresh.md \
            | claude --bare \
            -p - \
            --output-format stream-json \
            --verbose \
            --include-partial-messages \
            --no-session-persistence \
            --allowedTools "Bash,WebFetch,Read,Edit,Write" \
            --max-turns 200 \
            --max-budget-usd 5.00 \
            | stdbuf -oL tee /tmp/refresh-raw.jsonl \
            | jq -r --unbuffered '
                if .type == "assistant" then
                  (.message.content[]? |
                    if .type == "text" then .text
                    elif .type == "tool_use" then
                      "[tool] \(.name) \((.input.command // .input.url // .input.file_path // "") | .[0:120])"
                    else empty end)
                elif .type == "stream_event" then
                  if .event.type == "content_block_start"
                     and .event.content_block.type == "tool_use" then
                    "[tool] \(.event.content_block.name)"
                  else empty end
                else empty
                end
              ' \
            | stdbuf -oL tee /tmp/refresh-summary.txt

      - name: Lint skills
        run: |
          git add neo4j-*-skill/ || true
          python3 scripts/lint_skills.py

      - name: Check for changes
        id: changes
        run: |
          git diff --cached --quiet && git diff --quiet \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neo4j-*-skill/ .github/prompts/ || true
          git commit -m "skill-refresh: update skills against Neo4j release notes $(date +%Y-%m-%d)"

      - name: Push branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin "${{ steps.branch.outputs.name }}"

      - name: Extract summary for PR body
        if: steps.changes.outputs.changed == 'true'
        id: summary
        run: |
          # Extract the summary block printed by Claude
          SUMMARY=$(sed -n '/^<!-- SUMMARY_START -->/,$ p' /tmp/refresh-summary.txt \
            | tail -n +2 | head -60)
          # Write to file to avoid quoting issues
          echo "$SUMMARY" > /tmp/pr-body.txt
          cat >> /tmp/pr-body.txt << 'EOF'

          ---
          🤖 Generated by [skill-refresh workflow](.github/workflows/skill-refresh.yml) using [Claude Code](https://claude.ai/code)
          EOF

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "skill-refresh: Neo4j release notes scan $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.txt \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --label "skill-refresh,automated"

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No skill updates required — all skills current."
