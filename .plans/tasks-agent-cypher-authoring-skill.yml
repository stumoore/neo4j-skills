  - id: task-084
    title: "Add Schema Annotation Workflow to schema-retrieval.md (REQ-F-054)"
    description: |
      Extend references/schema/schema-retrieval.md (created in task-083) with a
      Schema Annotation Workflow section â€” a structured 5-step process the LLM
      follows after running the discovery queries to produce a domain-language
      annotated schema ready for use as a dataset: YAML block.

      The five steps to document:

      (a) DOMAIN IDENTIFICATION
        - Infer business domain from database name, label names, and property names
        - Choose terminology and annotation language appropriate to the likely user
          (e.g., "fraud ring investigation" for ucfraud, "content knowledge graph" for companies)
        - Assess user expertise level (technical analyst vs business user) and calibrate
          annotation vocabulary accordingly

      (b) LABEL AND RELATIONSHIP TRANSLATION
        - For each node label: write a plain-English annotation in parentheses
          e.g.: :Article â†’ "news article or press release" (do NOT use schema technical name in business output)
        - For each relationship type: describe what it means in business terms and direction
          e.g.: :HAS_CHUNK â†’ "is broken into text paragraphs for vector search (Article â†’ Chunk)"
        - Identify and flag empty relationships (0 edges â€” do NOT use in MATCH patterns)

      (c) PROPERTY ANNOTATION
        - For each property: note the business concept, data type, and observed range/values
          from Step 4 sampling
          e.g.: sentiment â†’ "article sentiment score, float -1.0 to 1.0 (negative = bad news, 0 = neutral)"
        - Flag data type gotchas: DATETIME vs DATE, string-encoded booleans ("true"/"false"),
          Unix epoch integers stored where datetime functions are expected, sparse properties
          (> 70% null rate from sampling)
        - Flag implicit foreign key properties (IDs that join to another label)

      (d) GOTCHA FLAGGING (explicit subsection)
        Produce a "âš  Gotchas" list covering:
        - Empty relationships (0 edges confirmed from db.schema.visualization)
        - DATETIME vs DATE type differences (affects temporal functions used)
        - String-encoded booleans (must use = 'true', not = true)
        - Sparse properties (add IS NOT NULL guard before predicating on them)
        - Properties used as implicit join keys (note which labels they link)

      (e) INDEX ANNOTATION
        - For each ONLINE index from Step 5: note which properties it covers and which
          query predicates it accelerates (mapped from the index type selection table in
          cypher25-indexes.md: RANGEâ†’equality/range, TEXTâ†’STARTS WITH/CONTAINS/ENDS WITH,
          FULLTEXTâ†’SEARCH USING FULLTEXT, VECTORâ†’SEARCH USING VECTOR)
        - Note that the existence of an index is required for the SEARCH clause to work â€”
          queries using SEARCH must reference a named index that exists in Step 5 output

      OUTPUT FORMAT:
        The annotated schema must be output as a compact dataset: YAML block conforming to
        the schema defined in REQ-F-030 (name, database, connection stub, description,
        schema.nodes with typed properties, schema.relationships with from/to direction,
        schema.indexes, notes). This output is directly usable as the dataset: section of
        a domain YAML case file.

      The Annotation Workflow section must fit within the â‰¤ 2,000 token budget of the file
      (which is shared with the discovery queries from task-083). If needed, condense the
      workflow into a numbered checklist referencing examples, rather than inline prose.
