  - id: task-088
    title: "Refactor generate_questions.py to batch JSONL generation via single claude invocation"
    description: |
      Prototype confirmed (2026-04-03): calling claude once with --plugin-dir + --allowedTools Write
      to generate all N questions for a domain and write each to a JSONL file works correctly.
      10 questions â†’ 10 JSONL lines, all with CYPHER 25, skill loaded via --plugin-dir.

      Current approach: one `claude` subprocess per question (N calls, N cold starts, N plugin loads).
      New approach: one `claude` call per domain, generates all questions, writes each to JSONL
      via Write tool, then reads back and parses.

      ## Prototype findings (from /tmp/neo4j-batch-test.jsonl)
      Command that worked:
        cat prompt.txt | claude --model claude-sonnet-4-6 --print --output-format text \
          --plugin-dir skill-generation-validation-tools/test-plugin \
          --allowedTools Write,Read

      Output format per line:
        {"id": "stackoverflow-basic-001", "cypher": "CYPHER 25\n...", "is_write_query": false}

      Notes:
      - File is written at the end (not incrementally); all N lines appear at once
      - --allowedTools must include Write (and optionally Read for JSONL append verification)
      - The skill /neo4j-skills-test-plugin:neo4j-cypher-authoring-skill must be the first line
        of stdin, followed by the full schema + all N question specs
      - --append-system-prompt with JSON format rules still needed to enforce output format

      ## Implementation steps

      1. In `generate_questions.py`, add `_generate_batch_cypher(questions, schema, domain, db_config)`
         that:
         - Builds a single prompt: skill slash command + schema + all N (question, difficulty,
           expected_description) specs + instruction to write one JSONL line per question to
           a temp file path (passed in the prompt)
         - Calls claude once with --plugin-dir + --allowedTools Write +
           --append-system-prompt with JSON enforcement rules
         - After claude exits, reads the temp JSONL file line by line
         - Returns list of {id, cypher, is_write_query} dicts

      2. Replace the `_generate_cypher()` per-question loop in `generate_domain()` with a single
         call to `_generate_batch_cypher()`. Pass the full question list for the domain in one shot.

      3. Keep `_generate_cypher()` as a fallback for single-question regeneration (used when
         a generated case fails validation and needs to be re-attempted individually).

      4. Prompt structure for the batch call:
         ```
         /neo4j-skills-test-plugin:neo4j-cypher-authoring-skill

         ## Schema
         <full YAML schema block>

         ## Task
         Generate Cypher queries for the following questions. For each question, write one
         JSON line to the file at <tmpfile>. Format exactly:
         {"id": "<domain>-<difficulty>-<NNN>", "cypher": "CYPHER 25\n...", "is_write_query": <bool>}

         ## Questions
         1. [basic-001] How many questions are in the database?
         2. [basic-002] ...
         ...
         ```

      5. After reading back JSONL, run the existing `_validate_case()` pipeline on each result.
         Cases that fail validation get queued for individual retry via `_generate_cypher()`.

      6. Update `generate_domain()` to:
         - Call `_generate_batch_cypher()` for the initial generation pass
         - Call `_generate_cypher()` for individual retries only
         - Log "batch mode: N questions â†’ 1 claude invocation" at INFO level

      Acceptance criteria:
      - `python generate_questions.py stackoverflow 10` produces 10 validated cases with
        exactly 1 claude invocation for generation (plus N validation calls to Neo4j)
      - Fallback to per-question mode if batch JSONL file is empty or missing
      - All generated queries start with CYPHER 25

    status: completed
    completed_at: "2026-04-03T00:00:00Z"
    dependencies:
      - task-078
    priority: medium
    acceptance_criteria:
      - "generate_questions.py uses 1 claude call per domain instead of N calls"
      - "JSONL temp file is read back and parsed correctly"
      - "Failed cases fall back to per-question _generate_cypher() retry"
      - "All output queries start with CYPHER 25"
