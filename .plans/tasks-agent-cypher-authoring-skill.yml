  - id: task-079
    title: "Implement ValidationResult dataclass and validate_question_language function (REQ-F-051)"
    description: |
      Create `skill-generation-validation-tools/tests/harness/question_validator.py`
      as a standalone module implementing the public API specified in REQ-F-051.

      1. Define a `ValidationResult` dataclass with three fields:
           - `is_valid: bool`
           - `violations: list[str]`  â€” each entry is "<matched_token> â†’ <rule_name>",
             e.g. "MATCH â†’ Cypher keyword", "Organization â†’ schema label", "n.name â†’ property dot-access"
           - `suggested_rewrite: str | None`  â€” None when is_valid=True

      2. Implement `validate_question_language(question: str, domain_schema: dict, model: str = "claude-sonnet-4-6") -> ValidationResult`:
           - `domain_schema` accepts keys: `labels` (list[str]), `rel_types` (list[str]),
             `properties` (list[str]), `procedure_prefixes` (list[str]); all optional.
           - Detection rules (applied in order, collect all violations before deciding):
               a. Schema labels: check each word in question against `domain_schema.get("labels", [])`
                  (case-insensitive) AND regex `:([A-Z][A-Za-z]+)` for inline label syntax
               b. Relationship types: check against `domain_schema.get("rel_types", [])` plus
                  regex `\b[A-Z]{2,}(_[A-Z]{2,})+\b` (ALL_CAPS_WITH_UNDERSCORES)
               c. Cypher keywords: fixed set â€” MATCH, WHERE, RETURN, WITH, CALL, MERGE, CREATE,
                  DELETE, SET, UNION, EXISTS, COUNT, COLLECT, LIMIT, SKIP, ORDER BY, OPTIONAL,
                  UNWIND, FOREACH, PROFILE, EXPLAIN, YIELD â€” matched as whole words, case-insensitive
               d. Property dot-access: regex `\b\w+\.\w+\b`
               e. Procedure/function names: check against `domain_schema.get("procedure_prefixes", [])`
                  plus built-in prefixes: `gds.`, `apoc.`, `db.index`, `ai.`, `db.schema`
               f. Schema property names: check question words against `domain_schema.get("properties", [])`
           - If no violations: return `ValidationResult(is_valid=True, violations=[], suggested_rewrite=None)`
           - If violations found: call Claude via `claude --print --model <model>` subprocess with
             prompt: "Rewrite this question as natural business language. Remove all graph database
             terms, Cypher keywords, label names, and technical identifiers. Return only the
             rewritten question, nothing else.\n\nOriginal: <question>"
             Capture stdout as `suggested_rewrite`. Return `ValidationResult(is_valid=False, violations=[...], suggested_rewrite=<rewrite>)`
           - If the Claude subprocess fails (non-zero exit or empty output): set `suggested_rewrite=None`

      3. The module must be importable as:
           `from harness.question_validator import validate_question_language`
         and also directly as a script: `python question_validator.py "<question>"` (prints JSON result).

      4. Add unit tests in `skill-generation-validation-tools/tests/test_question_validator.py`
         covering: clean question passes, Cypher keyword detected, schema label detected,
         dot-access detected, rel-type pattern detected, violations list has correct format strings.
         Unit tests must NOT require a live Claude call (mock the subprocess).
