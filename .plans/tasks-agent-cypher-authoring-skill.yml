  - id: task-078
    title: "Add 30s query execution timeout and EXPLAIN estimated-rows pre-check to validator.py"
    description: |
      Harness runs hang indefinitely when queries do full scans without index usage.
      Two defenses needed in validator.py:

      1. TIMEOUT: Use the Neo4j driver's built-in transaction timeout mechanism.
         Pass timeout=30 (seconds) to all driver.execute_query() calls via the
         `timeout` kwarg. For session.run() and tx.run() calls (write rollback,
         CALL IN TRANSACTIONS), set it via session config:
           driver.session(database=database, default_access_mode=..., timeout=30)
         or via transaction config: session.begin_transaction(timeout=30).
         On timeout the driver raises neo4j.exceptions.TransientError or ClientError
         with message containing "timeout" â€” catch and convert to a FAIL gate result:
         "Query timed out after 30s â€” likely missing index or unbounded scan"
         The timeout applies to Gates 1, 2, and 4 independently.

      2. EXPLAIN ESTIMATED ROWS PRE-CHECK (Gate 1 extension):
         After a successful EXPLAIN, extract the root plan's EstimatedRows from
         summary.plan.arguments. If EstimatedRows > 50_000_000 (configurable constant
         _MAX_EXPLAIN_ESTIMATED_ROWS = 50_000_000), FAIL Gate 1 immediately with:
         "EXPLAIN estimated {n:,} rows â€” query likely missing index for initial lookup
         or unbounded expansion; add a MATCH using an indexed property first"
         This prevents Gate 2/4 from running queries that would scan the whole graph.

      Implementation notes:
        - Extract EstimatedRows: plan.arguments.get('EstimatedRows', 0) on the ROOT
          plan node only (not summed â€” root represents the full output cardinality)
        - Add _QUERY_TIMEOUT_S = 30 and _MAX_EXPLAIN_ESTIMATED_ROWS = 50_000_000
          as module-level constants
        - All four gate executions in validate() must pass timeout to the driver
        - Add the same timeout to generator.py's live DB execution
        - Update AGENTS.md with: "validator.py has 30s driver-level timeout per gate;
          queries with EXPLAIN EstimatedRows >50M fail immediately at Gate 1"
    status: completed
    completed_at: "2026-04-02T12:00:00Z"
    dependencies: []
    priority: high
    acceptance_criteria:
      - "validator.py has _QUERY_TIMEOUT_S = 30 and passes timeout= to all driver calls"
      - "Gate 1 fails immediately when EXPLAIN EstimatedRows > 50_000_000"
      - "Harness run completes within 10 minutes on all 10 domains (no infinite hangs)"
      - "Timed-out cases show verdict FAIL with clear timeout message"
      - "generator.py live-execution calls also pass timeout= to driver"

