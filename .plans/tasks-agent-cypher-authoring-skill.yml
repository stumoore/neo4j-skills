    description: |
      Add a prominent note to write/cypher25-gds.md and SKILL.md GDS section:
      GDS algorithm procedures (gds.louvain.stream, gds.pageRank.stream, etc.) return
      results only during execution â€” they do NOT store properties on nodes unless a
      separate write-back step (gds.louvain.write, gds.pageRank.write) is run.
      Never assume properties like `node.louvainCommunity`, `node.pageRank`, etc. exist
      unless schema context confirms a write-back was performed.
      Add a negative example in the DO-NOT section:
        // WRONG â€” assumes louvainCommunity is a stored property
        MATCH (c:Customer) WHERE c.louvainCommunity = $community RETURN c
        // CORRECT â€” stream results from GDS instead
        CALL gds.louvain.stream('myGraph') YIELD nodeId, communityId
        WHERE communityId = $community
        RETURN gds.util.asNode(nodeId) AS customer
    status: completed
    completed_at: "2026-03-23T18:30:00Z"
    dependencies:
