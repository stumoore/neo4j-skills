  - id: task-083
    title: "Create references/schema/schema-retrieval.md â€” schema discovery sub-skill (REQ-F-053)"
    description: |
      Create a new L3 reference file at neo4j-cypher-authoring-skill/references/schema/schema-retrieval.md
      containing all six named schema discovery Cypher blocks that an LLM can copy-paste
      and run directly against any Neo4j database via MCP or direct driver access.

      The file must contain the following named steps as fenced Cypher blocks, each with a
      comment header identifying the step name and purpose:

      Step 1 â€” VERSION
        CALL dbms.components() YIELD name, versions RETURN name, versions[0] AS version
        (run against the 'system' database; cross-reference references/version-matrix.md for
        feature availability)

      Step 2 â€” CAPABILITIES
        SHOW PROCEDURES YIELD name
        WHERE name STARTS WITH 'gds.' OR name STARTS WITH 'apoc.' OR name STARTS WITH 'ai.'
        RETURN name ORDER BY name
        (also include APOC detection query:
         SHOW PROCEDURES YIELD name WHERE name = 'apoc.meta.schema'
         RETURN count(name) > 0 AS apocAvailable)

      Step 3 â€” FULL SCHEMA (preferred when APOC available)
        CALL apoc.meta.schema() YIELD value RETURN value
        Fallback (no APOC):
        CALL db.schema.visualization() YIELD nodes, relationships RETURN nodes, relationships

      Step 4 â€” PROPERTY VALUE SAMPLING (per label Ă— property)
        MATCH (n:Label) RETURN DISTINCT n.property LIMIT 20
        (template â€” substitute Label and property for each labelĂ—property pair discovered
        in Step 3; sampling stops at 20 values to avoid large result sets)

      Step 5 â€” INDEXES
        SHOW INDEXES YIELD name, type, labelsOrTypes, properties, state
        WHERE state = 'ONLINE'

      Step 6 â€” CONSTRAINTS
        SHOW CONSTRAINTS YIELD name, type, labelsOrTypes, properties

      All queries must have the CYPHER 25 prefix where syntactically required.
      The discovery query sequence in this file must mirror the logic in
      skill-generation-validation-tools/scripts/register_dataset.py (discover_version,
      discover_capabilities, discover_schema functions) so the sub-skill and the CLI
      produce equivalent results.

      File must:
      - have a > Source: header (hand-authored, version-pinned)
      - be â‰¤ 2,000 tokens
      - be syntactically valid for Neo4j 2025.x and 2026.x
      - include a note that Steps 1â€“3 are sufficient for most query generation tasks;
        Steps 4â€“6 are recommended for production queries requiring index awareness
    status: pending
