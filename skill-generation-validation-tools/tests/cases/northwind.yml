  # ─── WRITE CASES (5 cases) ────────────────────────────────────────────────────
  # Write queries are allowed on local bolt://localhost:7687 (read_only: false)
  # MERGE rule: ALWAYS MERGE each node separately first, THEN MERGE the relationship.
  # NEVER merge a relationship and unbound nodes in one MERGE statement.

  - id: northwind-write-001
    question: "Add a new product called 'Artisan Honey' with productID 9901, unit price of 12.50, and 50 units in stock. If it already exists, update its unitPrice and unitsInStock."
    database: northwind
    difficulty: intermediate
    tags: [merge, on-create-set, on-match-set, write]
    domain: northwind
    min_results: 0
    max_db_hits: 1000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 10000
    is_write_query: true
    notes: "Tests MERGE ON CREATE SET / ON MATCH SET pattern for upsert. productID is the unique key. Use separate property assignments for ON CREATE and ON MATCH."

  - id: northwind-write-002
    question: "Link product with productID 9901 to the Condiments category. First ensure both the product and category nodes exist, then create the PART_OF relationship between them."
    database: northwind
    difficulty: intermediate
    tags: [merge, relationship, write, part-of]
    domain: northwind
    min_results: 0
    max_db_hits: 1000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 10000
    is_write_query: true
    notes: "CRITICAL: Use three separate MERGE statements — first MERGE the product node, then MERGE the category node, then MERGE the relationship between the bound variables. NEVER merge nodes and relationship together in one MERGE."

  - id: northwind-write-003
    question: "Update product 'Chai' (productID 1) to set its unitPrice to 19.99 and unitsInStock to 45."
    database: northwind
    difficulty: basic
    tags: [set, write, property-update]
    domain: northwind
    min_results: 0
    max_db_hits: 500
    max_allocated_memory_bytes: 2097152
    max_runtime_ms: 5000
    is_write_query: true
    notes: "Simple MATCH + SET for property update. MATCH by productID (RANGE index exists), then SET both properties."

  - id: northwind-write-004
    question: "Move product 'Chai' (productID 1) from its current category to the Beverages category: delete the existing PART_OF relationship and create a new PART_OF to Beverages."
    database: northwind
    difficulty: advanced
    tags: [delete, merge, relationship, write, category-reassign]
    domain: northwind
