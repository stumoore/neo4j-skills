# northwind.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: northwind-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: bolt://localhost:7687
  username: neo4j
  database: northwind
  neo4j_version: "2026.02"
  cypher_version: "25"
  capabilities: [gds, apoc, apoc-extended, genai]
  read_only: false

dataset:
  name: northwind
  description: |
    A classic ERP (Enterprise Resource Planning) knowledge graph based on the Northwind trading
    company dataset. Covers products, product categories, suppliers, customers, and purchase orders.
    Use to explore product inventory and pricing, supplier networks, order histories, customer
    purchasing patterns, and geographic distribution of customers and suppliers.
    Contains 77 products, 8 categories, 29 suppliers, 91 customers, and 830 orders.
  schema:
    nodes:
      Product:
        description: "A product sold by the company"
        properties:
          productID:       {type: INTEGER, description: "Unique product identifier"}
          productName:     {type: STRING, sample: ["Chai", "Chang", "Aniseed Syrup", "Ikura", "Tofu"]}
          unitPrice:       {type: FLOAT, min: 2.5, max: 263.5, description: "Unit price in USD"}
          unitsInStock:    {type: INTEGER, min: 0, description: "Current stock level; 0 means out of stock"}
          unitsOnOrder:    {type: INTEGER, description: "Units currently on order from supplier"}
          reorderLevel:    {type: INTEGER, description: "Stock level that triggers a reorder"}
          discontinued:    {type: BOOLEAN, values: [true, false], description: "Whether the product has been discontinued"}
          quantityPerUnit: {type: STRING, description: "Packaging description (e.g. '24 - 12 oz bottles')"}
      Category:
        description: "A product category"
        properties:
          categoryID:   {type: INTEGER}
          categoryName: {type: STRING, values: ["Beverages", "Condiments", "Confections", "Dairy Products", "Grains/Cereals", "Meat/Poultry", "Produce", "Seafood"]}
          description:  {type: STRING}
      Supplier:
        description: "A company that supplies products"
        properties:
          supplierID:   {type: INTEGER}
          companyName:  {type: STRING, description: "Supplier company name"}
          contactName:  {type: STRING}
          contactTitle: {type: STRING}
          country:      {type: STRING, sample: ["UK", "USA", "Germany", "France", "Japan", "Sweden", "Australia"]}
          city:         {type: STRING}
          phone:        {type: STRING}
      Customer:
        description: "A customer company that purchases from Northwind"
        properties:
          customerID:   {type: STRING, description: "5-character customer code (e.g. 'ALFKI')"}
          companyName:  {type: STRING, sample: ["Alfreds Futterkiste", "Around the Horn", "Berglunds snabbköp"]}
          contactName:  {type: STRING}
          contactTitle: {type: STRING}
          country:      {type: STRING, sample: ["Germany", "Mexico", "UK", "USA", "France", "Sweden", "Canada"]}
          city:         {type: STRING}
          region:       {type: STRING, description: "Region or state (sparse — mainly US/Canada customers)"}
          phone:        {type: STRING}
      Order:
        description: "A customer purchase order"
        properties:
          orderID:      {type: INTEGER, description: "Unique order identifier"}
          orderDate:    {type: STRING, description: "Order placement date (stored as string 'YYYY-MM-DD HH:MM:SS.mmm')"}
          requiredDate: {type: STRING, description: "Requested delivery date (stored as string)"}
          shippedDate:  {type: STRING, description: "Actual shipment date (stored as string; null if not yet shipped)"}
          freight:      {type: STRING, description: "Freight charge (stored as string — use toFloat() to compare)"}
          shipCountry:  {type: STRING, sample: ["France", "Germany", "UK", "USA", "Brazil"]}
          shipCity:     {type: STRING}
          shipName:     {type: STRING}
    relationships:
      - type: PART_OF
        from: Product
        to: Category
        description: "Product belongs to this category"
      - type: SUPPLIES
        from: Supplier
        to: Product
        description: "Supplier provides this product"
      - type: PURCHASED
        from: Customer
        to: Order
        description: "Customer placed this order"
      - type: ORDERS
        from: Order
        to: Product
        description: "Order contains this product"
    indexes: []
  notes:
    - "Order.orderDate, Order.freight are stored as STRING — use toFloat(o.freight) for numeric comparisons"
    - "Product.discontinued is BOOLEAN — filter with p.discontinued = true or p.discontinued = false"
    - "Category names are exact: 'Beverages', 'Condiments', 'Confections', 'Dairy Products', 'Grains/Cereals', 'Meat/Poultry', 'Produce', 'Seafood'"
    - "Customer.customerID is a 5-character string (e.g. 'ALFKI'), not an integer"
    - "No vector or fulltext indexes — all queries use RANGE indexes or label scans"
    - "ORDERS relationship goes (Order)-[:ORDERS]->(Product), NOT (Customer)-[:ORDERS]->(Product)"
    - "SUPPLIES is 1:1 in this dataset — each product has exactly one supplier. 'Products with multiple suppliers' returns 0 rows — do not write such test cases."
    - "All 77 products appear in at least one order — 'products never ordered' returns 0 rows. Use inventory-based questions instead."
    - "22 products are at or below reorder level. 5 products are completely out of stock (unitsInStock=0). 8 products are discontinued."

