    max_db_hits: 1000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 10000
    is_write_query: true
    notes: "Pattern: MATCH and DELETE existing PART_OF rel, then MATCH (or MERGE) the Beverages category node, then MERGE the new (p)-[:PART_OF]->(c) relationship."

  - id: northwind-write-005
    question: "For all discontinued products, decrease their unitsInStock by 1 (simulating a stock decrement). Process them in batches of 10 rows using CALL IN TRANSACTIONS."
    database: northwind
