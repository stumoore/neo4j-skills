  # ─── WRITE CASES (5 cases) ────────────────────────────────────────────────────
  # Write queries are allowed on local bolt://localhost:7687 (read_only: false)
  # CRITICAL MERGE RULES (from skill):
  #   - ALWAYS MERGE each node separately by its unique key property ONLY
  #   - THEN MERGE the relationship between the already-bound node variables
  #   - NEVER: MERGE (u:User {user_key: $k, name: $n}) — multi-property = duplicates
  #   - NEVER: MERGE (:User {user_key: $a})-[:HAS_TAG]->(:Hashtag {tag: $t}) — ghost nodes

  - id: twitter-write-001
    question: "Add a new hashtag 'graphsummit' if it doesn't exist, then link it to an existing tweet with id '1234567890'. Make sure to create the hashtag and the link to the tweet as separate operations."
    database: twitter
    difficulty: intermediate
    tags: [merge, relationship, write, hashtag]
    domain: twitter
    min_results: 0
    max_db_hits: 1000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 10000
    is_write_query: true
    notes: "CRITICAL: Three separate MERGE statements — (1) MERGE (t:Tweet {id: $tweetId}), (2) MERGE (h:Hashtag {tag: $tag}), (3) MERGE (t)-[:HAS_TAG]->(h). NEVER merge nodes and relationship together."

  - id: twitter-write-002
    question: "Upsert an account with user_key 'u_99999': if new, set name='Test Account' and screen_name='testuser99'; if already exists, update their followers_count to 500."
    database: twitter
    difficulty: intermediate
    tags: [merge, on-create-set, on-match-set, write]
    domain: twitter
    min_results: 0
    max_db_hits: 500
    max_allocated_memory_bytes: 2097152
    max_runtime_ms: 5000
    is_write_query: true
    notes: "MERGE on user_key only (the lookup key). Set other properties via ON CREATE SET / ON MATCH SET. Never include name or screen_name in the MERGE pattern itself."

  - id: twitter-write-003
    question: "Add a new client app source 'Claude Code Bot' if it doesn't exist, then link it to the tweet with id '1234567890' as the source app that posted it."
    database: twitter
    difficulty: intermediate
    tags: [merge, relationship, write, source]
    domain: twitter
    min_results: 0
    max_db_hits: 500
    max_allocated_memory_bytes: 2097152
    max_runtime_ms: 5000
    is_write_query: true
    notes: "MERGE Source by name (RANGE index). MERGE Tweet by id. Then MERGE the POSTED_VIA relationship between bound variables."

  - id: twitter-write-004
    question: "Update the text of the tweet with id '1234567890' to append '[UPDATED]' at the end of its existing text."
    database: twitter
    difficulty: basic
    tags: [set, write, property-update]
    domain: twitter
    min_results: 0
    max_db_hits: 500
    max_allocated_memory_bytes: 2097152
    max_runtime_ms: 5000
    is_write_query: true
    notes: "Simple MATCH by Tweet.id (RANGE index) then SET t.text = t.text + ' [UPDATED]'."

  - id: twitter-write-005
    question: "Clean up orphaned retweet links: delete all retweet connections where the original tweet being retweeted has no user who posted it — i.e., the original tweet is not connected to any author."
    database: twitter
    difficulty: expert
    tags: [delete, batch-write, not-exists, write]
    domain: twitter
    min_results: 0
    max_db_hits: 50000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 30000
    is_write_query: true
    notes: "RETWEETED is Tweet->Tweet. Pattern: MATCH (rt:Tweet)-[r:RETWEETED]->(orig:Tweet) WHERE NOT EXISTS { ()-[:POSTED]->(orig) } DELETE r. Do NOT use CALL IN TRANSACTIONS here — harness runs in explicit transaction."
