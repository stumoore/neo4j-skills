database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: twitter
  password: twitter
  database: twitter
  neo4j_version: '2026.01'
  cypher_version: '25'
  capabilities:
  - gds
  - apoc
  - apoc-extended
  - genai
  read_only: true
dataset:
  name: twitter
  description: 'A social media knowledge graph based on Twitter/X activity. Contains users, tweets, hashtags,

    URLs, sources, and a special Troll label for identified troll accounts. Use to explore

    influencer networks, hashtag trends, retweet patterns, and follower graph topology.

    Contains 232,061 Tweets, 14,273 Users, 18 Sources, 12,919 Hashtags, 21,865 URLs, 453 Trolls.

    '
  schema:
    nodes:
      Tweet:
        description: A tweet post
        properties:
          id:
            type: STRING
            description: Tweet ID string — RANGE index exists on Tweet.id
          id_str:
            type: STRING
            description: Tweet ID as string (duplicate of id)
          text:
            type: STRING
            description: Tweet content
          created_at:
            type: INTEGER
            description: Unix timestamp (seconds) of when tweet was created — RANGE index on Tweet.created_at
          favorites:
            type: INTEGER
            description: Number of times this tweet was favorited/liked
          import_method:
            type: STRING
            description: How the tweet was imported into the graph
      User:
        description: A Twitter/X user account
        properties:
          screen_name:
            type: STRING
            description: Twitter handle (no @)
          name:
            type: STRING
            description: Display name
          followers:
            type: INTEGER
            description: Number of followers — use u.followers (NOT followers_count)
          following:
            type: INTEGER
            description: Number of accounts this user follows — use u.following (NOT friends_count)
          location:
            type: STRING
            description: Self-reported location (sparse)
          url:
            type: STRING
            description: Profile URL
          profile_image_url:
            type: STRING
            description: Profile image URL
          betweenness:
            type: FLOAT
            description: Betweenness centrality score for network analysis
      Source:
        description: The Twitter client app used to post (e.g. 'Twitter for iPhone')
        properties:
          name:
            type: STRING
            sample:
            - Twitter for iPhone
            - Twitter Web App
            - TweetDeck
            description: Client app name — RANGE index on Source.name
      Hashtag:
        description: A Twitter hashtag
        properties:
          name:
            type: STRING
            description: Hashtag text — RANGE index on Hashtag.name (use h.name NOT h.tag)
      Link:
        description: A URL link shared in a tweet
        properties:
          url:
            type: STRING
            description: URL link text
    relationships:
    - type: POSTS
      from: User
      to: Tweet
      description: User posted this tweet (2338 edges)
    - type: RETWEETS
      from: Tweet
      to: Tweet
      description: This tweet is a retweet of another tweet — (retweetTweet)-[:RETWEETS]->(originalTweet) (268 edges)
    - type: REPLY_TO
      from: Tweet
      to: Tweet
      description: This tweet is a reply to another tweet (504 edges)
    - type: USING
      from: Tweet
      to: Source
      description: Tweet was posted using this client app (2146 edges)
    - type: MENTIONS
      from: Tweet
      to: User
      description: Tweet mentions this user with @handle (3459 edges)
    - type: TAGS
      from: Tweet
      to: Hashtag
      description: Tweet uses this hashtag (1493 edges)
    - type: CONTAINS
      from: Tweet
      to: Link
      description: Tweet contains this URL link (1757 edges)
    - type: FOLLOWS
      from: User
      to: User
      description: User follows another user (44630 edges)
    - type: AMPLIFIES
      from: User
      to: User
      description: User amplifies another user's content (145 edges)
    - type: INTERACTS_WITH
      from: User
      to: User
      description: User has social interaction with another user (901 edges)
    - type: RT_MENTIONS
      from: User
      to: User
      description: User mentions another user in a retweet context (45 edges)
    - type: SIMILAR_TO
      from: User
      to: User
      description: User is similar to another user (210 edges)
    indexes:
    - name: Tweet.id
      type: RANGE
      label: Tweet
      property: id
    - name: Tweet.created_at
      type: RANGE
      label: Tweet
      property: created_at
    - name: User.screen_name
      type: RANGE
      label: User
      property: screen_name
    - name: Source.name
      type: RANGE
      label: Source
      property: name
    - name: Hashtag.name
      type: RANGE
      label: Hashtag
      property: name
    - name: Link.url
      type: RANGE
      label: Link
      property: url
  notes:
  - 'CRITICAL: Relationship names on demo server differ from local copy — use POSTS (not POSTED), RETWEETS (not RETWEETED),
    REPLY_TO (not IN_REPLY_TO), USING (not POSTED_VIA), TAGS (not HAS_TAG), CONTAINS (not HAS_LINK)'
  - 'CRITICAL: URL label is Link (not URL) — use (l:Link) with l.url property'
  - 'Hashtag property is ''name'' (not ''tag'') — use h.name for hashtag text, e.g. MATCH (h:Hashtag {name: ''neo4j''})'
  - 'Tweet.created_at is INTEGER (Unix epoch seconds) — use numeric range comparisons: WHERE t.created_at > 1500000000'
  - 'CRITICAL: User follower count is ''followers'' (not ''followers_count''), following count is ''following'' (not ''friends_count'')'
  - 'User.screen_name has RANGE index — use MATCH (u:User {screen_name: ''username''}) for efficient lookups'
  - FOLLOWS relationship exists (User→User, 44,630 edges) — use for social graph traversal
  - 'To find retweet authors: MATCH (rt:Tweet)-[:RETWEETS]->(orig:Tweet)<-[:POSTS]-(author:User)'
  - 'No Troll label on demo server — do not use :Troll in queries'
  - Demo DB is read-only — write cases SKIP
  - No vector or fulltext indexes — use string matching with RANGE index lookups
  - 'Tweet.id is STRING type — always quote in comparisons: WHERE t.id = ''123456789'''
  - QPE + quantifier NOT supported on demo server — use {1,} instead
