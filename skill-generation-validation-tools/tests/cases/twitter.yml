# twitter.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: twitter-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: bolt://localhost:7687
  username: neo4j
  database: twitter
  neo4j_version: "2026.02"
  cypher_version: "25"
  capabilities: [gds, apoc, apoc-extended, genai]
  read_only: false

dataset:
  name: twitter
  description: |
    A social media knowledge graph based on Twitter/X activity. Contains users, tweets, hashtags,
    URLs, sources, and a special Troll label for identified troll accounts. Use to explore
    influencer networks, hashtag trends, retweet patterns, and follower graph topology.
    Contains 232,061 Tweets, 14,273 Users, 18 Sources, 12,919 Hashtags, 21,865 URLs, 453 Trolls.
  schema:
    nodes:
      Tweet:
        description: "A tweet post"
        properties:
          id:          {type: STRING, description: "Tweet ID string — RANGE index exists on Tweet.id"}
          text:        {type: STRING, description: "Tweet content"}
          created_at:  {type: INTEGER, description: "Unix timestamp of when tweet was created"}
          created_str: {type: STRING, description: "Human-readable datetime string"}
      User:
        description: "A Twitter/X user account"
        properties:
          id:               {type: STRING, description: "User ID — RANGE index exists on User.id"}
          user_key:         {type: STRING, description: "Unique user key — RANGE index exists on User.user_key"}
          screen_name:      {type: STRING, description: "Twitter handle (no @)"}
          name:             {type: STRING, description: "Display name"}
          followers_count:  {type: INTEGER, description: "Number of followers"}
          friends_count:    {type: INTEGER, description: "Number of accounts this user follows"}
          statuses_count:   {type: INTEGER, description: "Total tweets/statuses posted"}
          favourites_count: {type: INTEGER, description: "Number of tweets this user has liked"}
          listed_count:     {type: INTEGER, description: "Number of lists this user appears in"}
          verified:         {type: BOOLEAN, description: "Whether the account is verified"}
          lang:             {type: STRING, description: "Account language setting"}
          location:         {type: STRING, description: "Self-reported location (sparse)"}
          description:      {type: STRING, description: "User bio (sparse)"}
          time_zone:        {type: STRING, description: "Account time zone (sparse)"}
      Troll:
        description: "A user identified as a troll account — has same properties as User. 453 Troll nodes."
        note: "Troll nodes have the same properties as User nodes but are labeled :Troll instead of :User."
      Source:
        description: "The Twitter client app used to post (e.g. 'Twitter for iPhone')"
        properties:
          name: {type: STRING, sample: ["Twitter for iPhone", "Twitter Web App", "TweetDeck"], description: "Client app name — RANGE index on Source.name"}
      Hashtag:
        description: "A Twitter hashtag"
        properties:
          tag: {type: STRING, description: "Hashtag text — RANGE index on Hashtag.tag"}
      URL:
        description: "A URL shared in a tweet"
        properties:
          expanded_url: {type: STRING, description: "Full expanded URL — RANGE index on URL.expanded_url"}
    relationships:
      - type: POSTED
        from: User
        to: Tweet
        description: "User posted this tweet"
      - type: RETWEETED
        from: Tweet
        to: Tweet
        description: "This tweet is a retweet of another tweet (retweetingTweet)-[:RETWEETED]->(originalTweet)"
      - type: IN_REPLY_TO
        from: Tweet
        to: Tweet
        description: "This tweet is a reply to another tweet"
      - type: POSTED_VIA
        from: Tweet
        to: Source
        description: "Tweet was posted using this client app"
      - type: MENTIONS
        from: Tweet
        to: User
        description: "Tweet mentions this user with @handle"
      - type: HAS_TAG
        from: Tweet
        to: Hashtag
        description: "Tweet uses this hashtag"
      - type: HAS_LINK
        from: Tweet
        to: URL
        description: "Tweet contains this URL link"
    indexes:
      - {name: "Tweet.id", type: RANGE, on: "Tweet(id)"}
      - {name: "User.user_key", type: RANGE, on: "User(user_key)"}
      - {name: "User.id", type: RANGE, on: "User(id)"}
      - {name: "Source.name", type: RANGE, on: "Source(name)"}
      - {name: "Hashtag.tag", type: RANGE, on: "Hashtag(tag)"}
      - {name: "URL.expanded_url", type: RANGE, on: "URL(expanded_url)"}
  notes:
    - "Hashtag property is 'tag' (not 'name') — use h.tag for hashtag text"
    - "URL property is 'expanded_url' (not 'url') — use u.expanded_url"
    - "User property for followers is 'followers_count' (not 'followers')"
    - "Tweet timestamps: created_at is INTEGER (Unix epoch), created_str is human-readable STRING"
    - "Relationship for posting is POSTED (not POSTS); for client app is POSTED_VIA (not USING)"
    - "Relationship for hashtags is HAS_TAG (not TAGS); for URLs is HAS_LINK (not CONTAINS)"
    - "Troll nodes are labeled :Troll (not :User) — 453 troll accounts in dataset"
    - "No FOLLOWS relationship in this dataset — social graph uses POSTED/RETWEETED/MENTIONS"
    - "RETWEETED is Tweet→Tweet (NOT User→Tweet): (retweetTweet)-[:RETWEETED]->(originalTweet). To find 'users who retweeted': MATCH (poster:User)-[:POSTED]->(rt:Tweet)-[:RETWEETED]->(orig:Tweet). To find 'most retweeted users': MATCH (rt:Tweet)-[:RETWEETED]->(orig:Tweet)<-[:POSTED]-(author:User)"
    - "No vector or fulltext indexes — use string matching with RANGE index lookups"
    - "Write queries ARE ALLOWED on this local database (MERGE, SET, CALL IN TRANSACTIONS)"

