# ucnetwork.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: ucnetwork-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: ucnetwork
  database: ucnetwork
  neo4j_version: "2026.01"
  cypher_version: "25"
  capabilities: [gds, apoc, apoc-extended, genai]
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: ucnetwork
  description: |
    A WiFi network monitoring knowledge graph capturing wireless device activity in a campus or
    enterprise environment. Devices (clients, access points, bridges) are observed through time-series
    snapshots. Each snapshot records signal strength, performance metrics, mobility patterns, and
    security posture. SSIDs (wireless networks) are linked to devices through probe, advertisement,
    response, and beacon relationships. Use to analyse device connectivity, signal quality trends,
    security vulnerabilities, and network topology.
    Contains 346 client devices, 243 access points, 171 WiFi bridges, 179 SSIDs, and 1,120 snapshots.
  schema:
    nodes:
      Client:
        description: "A WiFi client device (laptop, phone, IoT device etc.)"
        note: "Client nodes also have the Device label: (:Client:Device)"
        properties:
          mac:    {type: STRING, description: "MAC address of the device"}
          cname:  {type: STRING, description: "Device display name (often same as MAC)"}
          manufac: {type: STRING, description: "Hardware manufacturer (e.g. 'Intel Corporate', 'Apple, Inc.')"}
          type:   {type: STRING, values: ["Wi-Fi Client"], description: "Device type classification"}
          key:    {type: STRING, description: "Unique key identifier"}
          phy:    {type: STRING, description: "PHY layer type"}
      AccessPoint:
        description: "A WiFi access point or router"
        note: "AccessPoint nodes also have the Device label: (:AccessPoint:Device)"
        properties:
          mac:    {type: STRING, description: "MAC address of the access point"}
          name:   {type: STRING, description: "Network name / SSID broadcast name"}
          cname:  {type: STRING, description: "Display name"}
          manufac: {type: STRING, description: "Hardware manufacturer (e.g. 'TP-Link Corporation Limited', 'NETGEAR')"}
          type:   {type: STRING, description: "Device type"}
          key:    {type: STRING}
      SSID:
        description: "A wireless network identifier (network name)"
        properties:
          name:          {type: STRING, description: "SSID name (may be null for hidden networks)"}
          encryption:    {type: INTEGER, description: "Encryption type bitmask"}
          firstseen:     {type: INTEGER, description: "Unix timestamp when SSID was first observed"}
          lastseen:      {type: INTEGER, description: "Unix timestamp when SSID was last observed"}
          advdvlen:      {type: INTEGER, description: "Count of devices advertising this SSID"}
          respdvlen:     {type: INTEGER, description: "Count of devices responding to this SSID"}
          probingdvlen:  {type: INTEGER, description: "Count of devices probing for this SSID"}
          hash:          {type: STRING, description: "Hash identifier"}
      Snapshot:
        description: "A time-series observation snapshot for a device at a point in time"
        properties:
          id:         {type: INTEGER, description: "Snapshot identifier"}
          timestamp:  {type: DATETIME, description: "Neo4j DateTime of this snapshot — already a DateTime, do NOT use datetime({epochSeconds: ...}) conversion"}
          firstseen:  {type: DATETIME, description: "Neo4j DateTime when this device was first seen"}
          lastseen:   {type: DATETIME, description: "Neo4j DateTime when this device was last seen"}
          signalstr:  {type: INTEGER, description: "Signal strength in dBm (negative value; higher/less negative is stronger)"}
          nprssid:    {type: INTEGER, description: "Number of probe-request SSIDs seen"}
          ncaps:      {type: INTEGER, description: "Number of capabilities observed"}
          lbssid:     {type: STRING, description: "Last BSSID this device was associated with"}
          key:        {type: STRING}
      Signal:
        description: "Signal quality metrics for a snapshot"
        properties:
          id:        {type: INTEGER}
          frequency: {type: INTEGER, description: "WiFi channel frequency in MHz (e.g. 2412 = 2.4GHz ch1, 5180 = 5GHz ch36)"}
      Performance:
        description: "Performance metrics for a snapshot"
        properties:
          id:          {type: INTEGER}
          datasize:    {type: INTEGER, description: "Data transfer size"}
          datasizeretry: {type: INTEGER, description: "Retry data size (indication of poor link quality) — most nodes have 0; use datasizeretry > 0 to filter retransmitted frames (107 nodes, max 285323)"}
          linkmeasure: {type: INTEGER, description: "Link quality measurement"}
          maxtxpw:     {type: INTEGER, description: "Maximum transmit power"}
          mintxpw:     {type: INTEGER, description: "Minimum transmit power"}
      Mobility:
        description: "Mobility and roaming metrics for a snapshot"
        properties:
          id:          {type: INTEGER}
          lastbssid:   {type: STRING, description: "Last BSSID before current association"}
          signalchange: {type: INTEGER, description: "Signal strength change since last snapshot (dBm delta)"}
          seenbycount: {type: INTEGER, description: "Number of access points that have observed this device — values are typically 1 in current dataset; use seenbycount >= 1 for traversed clients"}
          firstseen:   {type: INTEGER}
          lastseen:    {type: INTEGER}
      SecurityPosture:
        description: "Security-related metrics for a snapshot"
        properties:
          id:       {type: INTEGER}
          nretries: {type: INTEGER, description: "Number of retransmission retries (high value = interference or attack) — 107 nodes have nretries > 0, max 358; use nretries > 0 for non-zero security metrics"}
          nfrag:    {type: INTEGER, description: "Number of fragmented frames (unusual fragmentation can indicate attacks)"}
          wpscount: {type: INTEGER, description: "Number of WPS interactions — NOTE: wpscount = 0 for ALL nodes in current dataset; do not filter by wpscount > 0. Use nretries > 0 instead for active security metrics."}
          wpslast:  {type: INTEGER, description: "Timestamp of last WPS interaction"}
          lastbssid: {type: STRING}
      WIFIBridge:
        description: "A WiFi bridge device extending the network"
        note: "WIFIBridge nodes also have the Device label: (:WIFIBridge:Device)"
        properties:
          mac:    {type: STRING}
          cname:  {type: STRING}
          manufac: {type: STRING}
      SSIDSnapshot:
        description: "A time-series snapshot for an SSID observation"
        properties:
          id: {type: INTEGER}
    relationships:
      - type: FIRST
        from: Client
        to: Snapshot
        description: "The first snapshot observed for this client device"
      - type: LAST
        from: Client
        to: Snapshot
        description: "The most recent snapshot for this client device"
      - type: NEXT
        from: Snapshot
        to: Snapshot
        description: "Linked list of snapshots in chronological order"
      - type: SIGNAL
        from: Snapshot
        to: Signal
        description: "Signal metrics for this snapshot"
      - type: PERFORMANCE
        from: Snapshot
        to: Performance
        description: "Performance metrics for this snapshot"
      - type: MOBILITY
        from: Snapshot
        to: Mobility
        description: "Mobility metrics for this snapshot"
      - type: SECURITY_POSTURE
        from: Snapshot
        to: SecurityPosture
        description: "Security posture metrics for this snapshot"
      - type: CONNECTED_TO
        from: Snapshot
        to: Snapshot
        description: "Snapshots observed communicating — typically (Client-Snapshot)-[:CONNECTED_TO]->(AccessPoint-Snapshot), not Client-to-Client. 393 edges total."
      - type: ADVERTISING_FOR
        from: Snapshot
        to: SSIDSnapshot
        description: "Snapshot shows device advertising this SSID (access point broadcasting)"
      - type: BEACONED
        from: Snapshot
        to: SSIDSnapshot
        description: "Snapshot shows beacon frames for this SSID"
      - type: PROBING_FOR
        from: Snapshot
        to: SSIDSnapshot
        description: "Snapshot shows device probing for this SSID (client looking for known networks)"
      - type: RESPONDING_FOR
        from: Snapshot
        to: SSIDSnapshot
        description: "Snapshot shows device responding for this SSID"
      - type: FIRST
        from: SSID
        to: SSIDSnapshot
        description: "First snapshot for this SSID"
      - type: LAST
        from: SSID
        to: SSIDSnapshot
        description: "Most recent snapshot for this SSID"
    indexes: []
  notes:
    - "Client/AccessPoint/WIFIBridge all have the :Device label — use the specific sub-label for clarity"
    - "FIRST and LAST relationships link Device nodes to their first/last Snapshot"
    - "Signal strength (signalstr) is negative dBm — values closer to 0 are stronger (e.g. -40 > -80)"
    - "Snapshot.timestamp, Snapshot.firstseen, Snapshot.lastseen are stored as Neo4j DateTime objects — NOT integer epochs. Use s.timestamp directly in comparisons or RETURN; do NOT wrap with datetime({epochSeconds: s.timestamp})."
    - "SSID.firstseen, SSID.lastseen are INTEGER epoch timestamps. Snapshot.timestamp is DateTime. Do not confuse these."
    - "No vector or fulltext indexes on this database"
    - "Snapshot linked list: traverse (d:Client)-[:FIRST]->(s:Snapshot)-[:NEXT*]->(s2:Snapshot) for history"
    - "SSIDSnapshot is an intermediate node linking SSID observations to device snapshots"
    - "Encryption field on SSID is an integer bitmask, not a string — do not filter by string values"
    - "PROBING_FOR data is sparse: only 22 total edges, 11 named SSIDs probed — each client typically probes via one snapshot only; no named SSID is probed by more than 1 distinct client via FIRST|LAST snapshots"
    - "SecurityPosture.nretries > 0 for 107 nodes (use > 0, not > 10 for retry activity); wpscount = 0 for ALL nodes — never filter by wpscount > 0"
    - "CONNECTED_TO links Snapshot-to-Snapshot (393 edges). In practice, s1 is a Client snapshot and s2 is an AccessPoint snapshot — NOT client-to-client. To find which clients connected to which APs: (c:Client)-[:FIRST|LAST]->(s1:Snapshot)-[:CONNECTED_TO]->(s2:Snapshot)<-[:FIRST|LAST]-(ap:AccessPoint). No 2-hop paths exist."
    - "ap.manufac is the manufacturer field on AccessPoint nodes (not ap.manufacturer)"
    - "ADVERTISING_FOR connects Snapshot-to-SSIDSnapshot (AP broadcasting a network); PROBING_FOR connects Snapshot-to-SSIDSnapshot (client looking for a network); RESPONDING_FOR connects Snapshot-to-SSIDSnapshot (AP responding to probe)"
    - "To link AP manufacturer to client signal strength: (ap:AccessPoint)-[:FIRST|LAST]->(apSnap)-[:ADVERTISING_FOR]->(ss:SSIDSnapshot)<-[:PROBING_FOR]-(cSnap:Snapshot) WHERE cSnap.signalstr IS NOT NULL"
    - "Avoid unbounded variable-length traversals on NEXT chains for large datasets — use LIMIT or bounded {0,N} quantifiers"

