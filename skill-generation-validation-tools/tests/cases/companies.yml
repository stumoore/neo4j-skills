    question: "Search for article text chunks related to 'renewable energy' using the full-text index on chunk text. For each matching chunk, show the article title it belongs to, the relevance score, and which companies the article mentions. Return up to 10 results ordered by relevance score."
    database: companies
    difficulty: expert
    tags: [fulltext, procedure, graphrag, relationship]
    domain: companies
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 100000000
    max_runtime_ms: 60000
    is_write_query: false
    notes: |
      Use the 'news_fulltext' fulltext index (on Chunk.text) — NOT the 'entity' index (on Organization/Person names).
      Correct pattern:
        CALL db.index.fulltext.queryNodes('news_fulltext', 'renewable energy') YIELD node AS chunk, score
        MATCH (a:Article)-[:HAS_CHUNK]->(chunk)
        OPTIONAL MATCH (a)-[:MENTIONS]->(org:Organization)
        RETURN a.title AS articleTitle, score, collect(DISTINCT org.name)[0..3] AS companies
        ORDER BY score DESC LIMIT 10
      NEVER: CALL db.index.fulltext.queryNodes('entity', ...) ... WHERE node:Article — entity index is on Organization names, returns 0 Article rows.

