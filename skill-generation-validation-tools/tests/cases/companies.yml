  - id: companies-advanced-009
    question: "Which pairs of companies in the same industry category are also covered together in the same news articles? Show the category, the company pair, and how often they appear together."
    database: companies
    difficulty: advanced
    tags: [match, multi-pattern, relationship, aggregation, category]
    domain: companies
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 50000000
    max_runtime_ms: 30000
    is_write_query: false
    notes: "CRITICAL: use HAS_CATEGORY (not IN_INDUSTRY — that rel type does not exist in this DB)"
    cypher: |
      CYPHER 25
      MATCH (a:Organization)-[:HAS_CATEGORY]->(cat:IndustryCategory)<-[:HAS_CATEGORY]-(b:Organization)
      WHERE elementId(a) < elementId(b)
      MATCH (art:Article)-[:MENTIONS]->(a), (art)-[:MENTIONS]->(b)
      RETURN cat.name AS category,
             a.name AS companyA,
             b.name AS companyB,
             count(art) AS coOccurrences
      ORDER BY coOccurrences DESC
      LIMIT 20

