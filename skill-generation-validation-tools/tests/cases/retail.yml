# retail.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: retail-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: retail
  database: retail
  neo4j_version: "2026.01"
  cypher_version: "25"
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: retail
  description: |
    A fashion retail knowledge graph based on the H&M Kaggle dataset. Covers fashion products,
    product articles (specific variants), departments, and customer purchase transactions.
    Each purchase is represented as a PURCHASED relationship with a transaction date, price, and
    sales channel. Two vector indexes support semantic search on product descriptions and visual
    article graph embeddings. Use to explore product catalogues, department structure, customer
    purchasing patterns, and product similarity.
    Contains 8,044 products, 13,351 articles, 266 departments, 1,000 customers, and 23,199 purchases.
  schema:
    nodes:
      Product:
        description: "A base fashion product (master record covering all colour/size variants)"
        properties:
          productCode:       {type: INTEGER, description: "Unique product code"}
          prodName:          {type: STRING, sample: ["Strap top", "OP T-shirt (Idro)", "Shape Up 30 den 1p Tights"]}
          productGroupName:  {type: STRING, sample: ["Garment Upper body", "Underwear", "Socks & Tights", "Garment Lower body", "Accessories"]}
          productTypeName:   {type: STRING, sample: ["Vest top", "Bra", "Leggings/Tights", "Trousers", "T-shirt"]}
          garmentGroupName:  {type: STRING, sample: ["Jersey Basic", "Under-, Nightwear", "Socks and Tights", "Jersey Fancy"]}
          garmentGroupNo:    {type: INTEGER}
          text:              {type: STRING, description: "Detailed product description for search"}
          detailDesc:        {type: STRING, description: "Short description"}
          url:               {type: STRING}
          textEmbedding:     {type: VECTOR, dimensions: 1536, description: "Text embedding of product description"}
      Article:
        description: "A specific product variant (specific colour/style combination)"
        properties:
          articleId:               {type: INTEGER, description: "Unique article identifier"}
          prodName:                {type: STRING, description: "Article product name (same as parent Product in most cases)"}
          productTypeName:         {type: STRING}
          colourGroupCode:         {type: STRING}
          colourGroupName:         {type: STRING, sample: ["Black", "White", "Blue", "Grey", "Beige", "Pink", "Red"]}
          graphicalAppearanceNo:   {type: INTEGER}
          graphicalAppearanceName: {type: STRING, sample: ["Solid", "Stripe", "Melange"]}
          graphEmbedding:          {type: VECTOR, dimensions: 128, description: "Visual graph embedding of the article"}
      Department:
        description: "A store department and section classification"
        properties:
          departmentNo:   {type: INTEGER}
          departmentName: {type: STRING, sample: ["Jersey Basic", "Clean Lingerie", "Tights basic", "Jersey"]}
          sectionNo:      {type: INTEGER}
          sectionName:    {type: STRING, sample: ["Womens Everyday Basics", "Womens Lingerie", "Men Underwear", "Mama"]}
      Customer:
        description: "A retail customer"
        properties:
          customerId:           {type: STRING, description: "Unique customer identifier string"}
          age:                  {type: FLOAT, description: "Customer age in years (sparse — some customers have null age)"}
          clubMemberStatus:     {type: STRING, values: ["ACTIVE", "PRE-CREATE"], description: "Loyalty club status"}
          fashionNewsFrequency: {type: STRING, values: ["Regularly", "NONE"], description: "Frequency of fashion newsletter subscription"}
          active:               {type: FLOAT, values: [1.0], description: "Whether the customer is active (1.0 = active; null = inactive)"}
    relationships:
      - type: PURCHASED
        from: Customer
        to: Article
        description: "Customer purchased this article — relationship has transaction properties"
        properties:
          tDat:         {type: DATE, description: "Transaction date"}
          price:        {type: FLOAT, description: "Purchase price (normalised 0–1 scale)"}
          salesChannelId: {type: INTEGER, values: [1, 2], description: "1 = store, 2 = online"}
      - type: VARIANT_OF
        from: Article
        to: Product
        description: "This article is a variant of the parent product"
      - type: FROM_DEPARTMENT
        from: Article
        to: Department
        description: "This article belongs to this department"
    indexes:
      - name: product_text_embeddings
        type: VECTOR
        on: Product(textEmbedding)
        dimensions: 1536
        similarity: cosine
        call: "CALL db.index.vector.queryNodes('product_text_embeddings', N, $vec) YIELD node, score"
        description: "Vector similarity search on product text descriptions"
      - name: article_graph_embeddings
        type: VECTOR
        on: Article(graphEmbedding)
        dimensions: 128
        similarity: cosine
        call: "CALL db.index.vector.queryNodes('article_graph_embeddings', N, $vec) YIELD node, score"
        description: "Graph embedding similarity search on article visual features"
  notes:
    - "Articles are specific colour/style variants — each article belongs to a parent Product via VARIANT_OF"
    - "PURCHASED is on (Customer)-[:PURCHASED]->(Article) — NOT to Product directly"
    - "FROM_DEPARTMENT is on (Article)-[:FROM_DEPARTMENT]->(Department)"
    - "Purchase price is normalised (0–1 scale) — not a real currency amount"
    - "salesChannelId: 1 = in-store, 2 = online"
    - "Customer age may be null (NaN stored as null in graph) — use IS NOT NULL guards"
    - "clubMemberStatus values: 'ACTIVE' or 'PRE-CREATE'"
    - "article_graph_embeddings uses 128 dimensions (not 1536) — do not mix with product vector index"
    - "Vector search: use CALL db.index.vector.queryNodes('article_graph_embeddings', N, $vec) YIELD node AS a, score — SEARCH clause is NOT available (server is 2026.01.x)"

