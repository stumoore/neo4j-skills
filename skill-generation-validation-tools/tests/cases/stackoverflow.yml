# stackoverflow.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: stackoverflow-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: stackoverflow
  database: stackoverflow
  neo4j_version: "2026.01"
  cypher_version: "25"
  gds: true
  capabilities: [apoc, apoc-extended, genai]
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: stackoverflow
  description: |
    A Q&A knowledge graph containing Stack Overflow questions, answers, users, and programming
    language tags. A large dataset with ~41M posts, ~8.9M users, and ~52K tags. Use to explore
    expert knowledge networks, popular programming topics, answer quality, user reputation
    patterns, and tag co-occurrence relationships.
  schema:
    nodes:
      Question:
        description: "A question post on Stack Overflow — also has the Post label"
        note: "Questions also have the Post label: (:Post:Question). Always use :Question for specificity."
        properties:
          id:        {type: INTEGER, description: "Unique post identifier"}
          title:     {type: STRING,  sample: ["How do I calculate someone's age in C#?", "Convert Decimal to Double?"]}
          score:     {type: INTEGER, description: "Net upvotes minus downvotes — can be negative"}
          views:     {type: INTEGER, description: "Total view count"}
          answers:   {type: INTEGER, description: "Number of answers"}
          comments:  {type: INTEGER, description: "Number of comments"}
          favorites: {type: INTEGER, description: "Number of times bookmarked"}
          createdAt: {type: DATETIME, sample: ["2008-07-31T21:42:52Z"], description: "DateTime of post creation"}
          updatedAt: {type: DATETIME, description: "DateTime of last edit"}
      Answer:
        description: "An answer post — also has the Post label: (:Post:Answer)"
        note: "Answers also have the Post label. Use :Answer for specificity."
        properties:
          id:    {type: INTEGER}
          score: {type: INTEGER, description: "Net upvote score of the answer"}
      User:
        description: "A Stack Overflow user account"
        properties:
          id:         {type: INTEGER}
          name:       {type: STRING, description: "Display name"}
          reputation: {type: INTEGER, min: 1, description: "Reputation score — higher = more trusted"}
          views:      {type: INTEGER, description: "Number of profile views"}
          upvotes:    {type: INTEGER}
          age:        {type: INTEGER, description: "User-reported age (sparse)"}
          location:   {type: STRING, description: "User-reported location (sparse)"}
          accountId:  {type: INTEGER}
          createdAt:  {type: DATETIME, description: "Account creation date"}
      Tag:
        description: "A programming topic tag"
        properties:
          name:  {type: STRING, sample: ["javascript", "python", "java", "c#", "php", "html", "css"]}
          count: {type: INTEGER, description: "Total number of questions using this tag"}
    relationships:
      - type: POSTED
        from: User
        to: Question
        description: "User posted this question"
      - type: ANSWERED
        from: Answer
        to: Question
        description: "This answer responds to the question"
      - type: ACCEPTED
        from: Question
        to: Answer
        description: "This answer was accepted as the best answer by the question author"
      - type: TAGGED
        from: Question
        to: Tag
        description: "Question is tagged with this topic"
      - type: SIMILAR
        from: Tag
        to: Tag
        description: "Two tags frequently co-occur on the same questions"
    indexes:
      - name: constraint_8a34654d
        type: RANGE
        on: Post(id)
      - name: constraint_47e7f15d
        type: RANGE
        on: User(id)
      - name: constraint_64b1b1cf
        type: RANGE
        on: Tag(name)
      - name: index_628c515a
        type: RANGE
        on: Question(score)
      - name: index_d3930a6c
        type: RANGE
        on: Question(views)
      - name: index_4cda2ad1
        type: RANGE
        on: User(reputation)
  notes:
    - "Very large DB: ~41M posts, ~8.9M users — always use indexed properties in WHERE and add LIMIT"
    - "Questions have dual label (:Post:Question) — use :Question for matching questions specifically"
    - "Answers have dual label (:Post:Answer) — use :Answer for specificity"
    - "Tag.count is denormalized (pre-computed) — faster than counting via TAGGED relationships"
    - "Demo DB is read-only — write cases SKIP"
    - "QPE '+' quantifier NOT supported on demo server — use {1,} instead"
    - "No vector or fulltext index in this database"
    - "LIMIT is mandatory for most queries on this DB to avoid full scans on 41M nodes"

