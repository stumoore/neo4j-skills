# ucfraud.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: ucfraud-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: bolt://localhost:7687
  username: neo4j
  database: neo4j
  neo4j_version: "2026.02.1"
  cypher_version: "25"
  capabilities: [gds, apoc, apoc-extended, genai]

dataset:
  name: ucfraud
  description: |
    A financial transaction fraud detection graph modelling bank customers, their accounts,
    the transactions between accounts, and shared personal details (email, phone, address)
    that indicate potential fraud rings. Use to detect suspicious transaction patterns, identify
    fraud network clusters, trace money flows between accounts, and flag at-risk customers.
  schema:
    nodes:
      Transaction:
        description: "A financial transaction between two accounts"
        properties:
          transactionID: {type: STRING,  description: "Unique transaction identifier"}
          amount:        {type: FLOAT,   min: 0.01, description: "Transaction amount in currency units"}
          date:          {type: DATETIME, sample: ["2024-12-03T00:00:00Z", "2025-03-15T00:00:00Z"], description: "DateTime type — actual range is 2024-05-20 to 2025-05-09. Use datetime() for comparisons: WHERE t.date >= datetime('2024-01-01')"}
          type:          {type: STRING,  values: [Transfer, Deposit, Withdrawal], description: "Title case — 'Transfer' not 'transfer'"}
          status:        {type: STRING,  values: [Completed, Pending, Failed], description: "Title case — 'Completed' not 'completed'"}
      Account:
        description: "A bank account belonging to a customer"
        properties:
          accountID:        {type: STRING}
          accountNumber:    {type: STRING}
          accountType:      {type: STRING,  values: [Savings, Checking], description: "Title case — 'Savings' not 'savings'"}
          balance:          {type: FLOAT,   description: "Current account balance"}
          status:           {type: STRING,  values: [Active, Closed, Frozen], description: "Title case — 'Active' not 'active'. No 'suspended' value in dataset."}
          louvainCommunity: {type: INTEGER, description: "Fraud ring cluster ID from Louvain community detection — same value = same suspected fraud cluster"}
          pagerank:         {type: FLOAT,   description: "Network influence score (PageRank)"}
      Customer:
        description: "A bank customer who holds one or more accounts"
        properties:
          customerID:       {type: STRING}
          name:             {type: STRING,  sample: ["John Smith", "Maria Garcia"], description: "Full name — searchable via fulltext index 'customerNames'"}
          dateOfBirth:      {type: DATE}
          fraudFlag:        {type: STRING,  values: ["True", "False"], description: "STRING not boolean — use: WHERE c.fraudFlag = 'True'"}
          louvainCommunity: {type: INTEGER, description: "Fraud ring cluster ID — matches Account.louvainCommunity for linked accounts"}
          betweenness:      {type: FLOAT,   description: "Betweenness centrality — high value = bridge node in fraud network"}
          pagerank:         {type: FLOAT,   description: "Network influence score"}
      Email:
        properties:
          email: {type: STRING}
      Address:
        properties:
          address: {type: STRING}
      PhoneNumber:
        properties:
          phoneNumber: {type: STRING}
      Alert:
        description: "A fraud alert linked to an account"
        properties:
          alertId: {type: STRING, description: "Unique alert identifier — NOTE: Alert nodes only have alertId, no description or severity"}
      AlertStatus:
        properties:
          status: {type: STRING, values: ["01-New", "02-Validated", "03-ConfirmedValidated", "04-Recycled", "05-Rejected", "06-ConfirmedRejected"], description: "Status code with numeric prefix — e.g. '01-New', '02-Validated'. Use STARTS WITH '01' to match New status."}
      Jurisdiction:
        properties:
          name: {type: STRING}
      Country:
        properties:
          name: {type: STRING}
    relationships:
      - {type: SENT,               from: Account,    to: Transaction,  description: "Account that originated/sent the transaction"}
      - {type: RECEIVED,           from: Transaction, to: Account,      description: "Account that received the transaction funds"}
      - {type: TRANSACTED_TO,      from: Account,    to: Account,      description: "Direct transfer link between accounts (derived convenience relationship)"}
      - {type: SHARED_IDENTIFIERS, from: Customer,   to: Customer,     description: "Customers sharing email, phone, or address — key fraud ring signal. NOTE: connects Customer nodes, NOT Account nodes."}
      - {type: HAS_ACCOUNT,        from: Customer,   to: Account}
      - {type: USES_EMAIL,         from: Customer,   to: Email}
      - {type: USES_PHONE,         from: Customer,   to: PhoneNumber}
      - {type: RESIDES_AT,         from: Customer,   to: Address}
      - {type: LOCATED_IN,         from: Address,    to: Country}
      - {type: HAS_ALERT,          from: Scenario,   to: Alert,        description: "A Scenario groups related Alerts — (s:Scenario)-[:HAS_ALERT]->(alert:Alert). NOT from Account."}
      - {type: HAS_STATUS,         from: Alert,      to: AlertStatus}
      - {type: ASSOCIATED_WITH,    from: Transaction, to: Jurisdiction}
    indexes:
      - name: customerNames
        type: FULLTEXT
        on: Customer(name)
        call: "CALL db.index.fulltext.queryNodes('customerNames', $q) YIELD node, score"
        description: "Full-text search on customer names"
      - name: transactionTypes
        type: FULLTEXT
        on: "Transaction(type, status)"
        call: "CALL db.index.fulltext.queryNodes('transactionTypes', $q) YIELD node, score"
        description: "Full-text search on transaction type and status"
  notes:
    - "Money flow pattern: (sender:Account)-[:SENT]->(t:Transaction)-[:RECEIVED]->(receiver:Account)"
    - "Direct transfer link: (a:Account)-[:TRANSACTED_TO]->(b:Account)"
    - "Fraud rings: (c1:Customer)-[:SHARED_IDENTIFIERS]->{2,4}(c2:Customer) — SHARED_IDENTIFIERS links Customer nodes, NOT Account nodes"
    - "SEARCH clause IS AVAILABLE on this local Neo4j 2026.02.1 instance (vector only)"
    - "Write queries ARE ALLOWED on this local database (MERGE, SET, CALL IN TRANSACTIONS)"
    - "QPE {m,n} syntax is fully supported here — use for bounded fraud chain traversal"
    - "SHORTEST N syntax is supported for shortest path queries"
    - "Customer.fraudFlag is a STRING 'True'/'False' — NOT a boolean. Use: WHERE c.fraudFlag = 'True'"
    - "All enum values are Title case: Account.status='Active'/'Closed'/'Frozen', Transaction.type='Transfer'/'Deposit'/'Withdrawal', Transaction.status='Completed'/'Pending'/'Failed'"
    - "louvainCommunity groups accounts into suspected fraud clusters — same integer = same cluster"

cases:
  # ---------------------------------------------------------------------------
  # BASIC (6 cases) — simple lookups, counts, property filters
  # ---------------------------------------------------------------------------
  - id: "ucf-basic-001"
    question: "How many transactions are recorded in the system in total?"
    difficulty: basic
    tags: [match, count, labels]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (t:Transaction)
      RETURN count(t) AS totalTransactions

  - id: "ucf-basic-002"
    question: "Which active accounts have the highest balances? Show the account number and current balance for the top 20."
    difficulty: basic
    tags: [match, filter, property]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (a:Account)
      WHERE a.status = 'Active'
      RETURN a.accountNumber AS accountNumber, a.balance AS balance
      ORDER BY a.balance DESC
      LIMIT 20

  - id: "ucf-basic-003"
    question: "What types of transactions does the system support?"
    difficulty: basic
    tags: [match, distinct, aggregation]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (t:Transaction)
      RETURN DISTINCT t.type AS transactionType
      ORDER BY transactionType

  - id: "ucf-basic-004"
    question: "Show me the customers who have been flagged for fraud. Who are the most at-risk based on their network influence score?"
    difficulty: basic
    tags: [match, filter, fraud]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)
      WHERE c.fraudFlag = 'True'
      RETURN c.name AS name, c.pagerank AS pagerank
      ORDER BY c.pagerank DESC
      LIMIT 20

  - id: "ucf-basic-005"
    question: "What are the largest transactions in the system? Show the top 10 by amount, including transaction type and status."
    difficulty: basic
    tags: [match, order, limit]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (t:Transaction)
      RETURN t.amount AS amount, t.type AS type, t.status AS status
      ORDER BY t.amount DESC
      LIMIT 10

  - id: "ucf-basic-006"
    question: "How many accounts of each type (savings, checking, etc.) are in the system?"
    difficulty: basic
    tags: [match, aggregation, groupby]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 5000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 5000
    cypher: |
      CYPHER 25
      MATCH (a:Account)
      RETURN a.accountType AS accountType, count(a) AS accountCount
      ORDER BY accountCount DESC

  # ---------------------------------------------------------------------------
  # INTERMEDIATE (6 cases) — multi-hop traversal, aggregation, temporal
  # ---------------------------------------------------------------------------
  - id: "ucf-intermediate-001"
    question: "Which accounts are sending the most money? Show the total amount sent and number of transactions per account."
    difficulty: intermediate
    tags: [match, traversal, aggregation]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (a:Account)-[:SENT]->(t:Transaction)
      RETURN a.accountNumber AS accountNumber,
             count(t) AS transactionCount,
             sum(t.amount) AS totalSent
      ORDER BY totalSent DESC
      LIMIT 20

  - id: "ucf-intermediate-002"
    question: "Show me which customers own which accounts, including the account balance and account type."
    difficulty: intermediate
    tags: [match, traversal, join]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)-[:HAS_ACCOUNT]->(a:Account)
      RETURN c.name AS customerName,
             a.accountNumber AS accountNumber,
             a.balance AS balance,
             a.accountType AS accountType
      ORDER BY a.balance DESC
      LIMIT 20

  - id: "ucf-intermediate-003"
    question: "What does transaction activity look like across 2025? Break down the count and total value by transaction type."
    difficulty: intermediate
    tags: [match, temporal, aggregation]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000

  - id: "ucf-intermediate-004"
    question: "Which customers appear to be linked to each other through shared personal details? Show the pairs of linked customer names."
    difficulty: intermediate
    tags: [match, traversal, fraud, shared-identifiers]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (c1:Customer)-[:SHARED_IDENTIFIERS]->(c2:Customer)
      WHERE c1.customerID < c2.customerID
      RETURN c1.name AS customer1,
             c2.name AS customer2
      LIMIT 20

  - id: "ucf-intermediate-005"
    question: "How many email addresses does each customer have on file? Show customers along with their email count, sorted by most emails first."
    difficulty: intermediate
    tags: [match, aggregation, filter, email]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)-[:USES_EMAIL]->(e:Email)
      WITH c, count(e) AS emailCount
      RETURN c.name AS customerName, emailCount
      ORDER BY emailCount DESC
      LIMIT 20

  - id: "ucf-intermediate-006"
    question: "What is the average, highest, and total number of transactions for each transaction status (pending, completed, etc.)?"
    difficulty: intermediate
    tags: [match, aggregation, groupby]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (t:Transaction)
      RETURN t.status AS status,
             count(t) AS count,
             avg(t.amount) AS avgAmount,
             max(t.amount) AS maxAmount
      ORDER BY avgAmount DESC

  # ---------------------------------------------------------------------------
  # ADVANCED (6 cases) — QPE, OPTIONAL MATCH, subqueries, SHORTEST path
  # ---------------------------------------------------------------------------
  - id: "ucf-advanced-001"
    question: "Which customers are indirectly linked to each other through chains of shared personal details? I want to see customer pairs that are connected through two to four intermediate links."
    difficulty: advanced
    tags: [qpe, fraud-ring, quantified-path]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (a:Customer) ((x)-[:SHARED_IDENTIFIERS]-(y)){2,4} (b:Customer)
      WHERE a.customerID <> b.customerID
      RETURN a.name AS startCustomer,
             b.name AS endCustomer
      LIMIT 20

  - id: "ucf-advanced-002"
    question: "What is the shortest chain of shared identity links connecting a flagged customer to one who is not yet flagged?"
    difficulty: advanced
    tags: [shortest-path, traversal, fraud]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (c1:Customer {fraudFlag: 'True'}), (c2:Customer {fraudFlag: 'False'})
      WITH c1, c2 LIMIT 10
      MATCH p = SHORTEST 1 (c1)-[:SHARED_IDENTIFIERS*]-(c2)
      RETURN c1.name AS flaggedCustomer,
             c2.name AS unflaggedCustomer,
             length(p) AS chainLength
      LIMIT 5

  - id: "ucf-advanced-003"
    question: "Which customers sit at the center of the most financial connections in our network? For each, show whether they have any open alerts or investigations."
    difficulty: advanced
    tags: [optional-match, centrality, alert]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)
      WHERE c.betweenness > 100
      OPTIONAL MATCH (c)-[:HAS_ACCOUNT]->(a:Account)-[:HAS_ALERT]->(al:Alert)
      RETURN c.name AS customerName,
             c.betweenness AS betweenness,
             count(al) AS alertCount
      ORDER BY betweenness DESC

  - id: "ucf-advanced-004"
    question: "Which accounts have been particularly active — sending more than three transactions? Show the account number, type, and transaction count."
    difficulty: advanced
    tags: [subquery, count, filter]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (a:Account)
      WHERE COUNT { (a)-[:SENT]->(:Transaction) } > 3
      RETURN a.accountNumber AS accountNumber,
             a.accountType AS accountType,
             COUNT { (a)-[:SENT]->(:Transaction) } AS txCount
      ORDER BY txCount DESC

  - id: "ucf-advanced-005"
    question: "Which transactions are unusually large compared to other transactions of the same type? Show transactions that exceed the average for their category."
    difficulty: advanced
    tags: [aggregation, filter, with]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (t:Transaction)
      WITH t.type AS txType, avg(t.amount) AS avgAmount
      MATCH (t2:Transaction)
      WHERE t2.type = txType AND t2.amount > avgAmount
      RETURN t2.transactionID AS transactionID,
             t2.type AS type,
             t2.amount AS amount,
             avgAmount
      ORDER BY t2.amount DESC
      LIMIT 20

  - id: "ucf-advanced-006"
    question: "Look up customers with the surname 'Hoffman'. Are any of them flagged for fraud, and how prominent are they in our customer network?"
    difficulty: advanced
    tags: [search, fulltext, index]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 10000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)
      WHERE c.name CONTAINS 'Hoffman'
      RETURN c.name AS name,
             c.fraudFlag AS fraudFlag,
             c.pagerank AS pagerank

  # ---------------------------------------------------------------------------
  # COMPLEX (4 cases) — multi-ring detection, temporal anomaly, CALL subquery
  # ---------------------------------------------------------------------------
  - id: "ucf-complex-001"
    question: "Find pairs of customers that share personal details where at least one is flagged for fraud. Show both customer names and their fraud status."
    difficulty: complex
    tags: [fraud-ring, shared-identifiers, call-subquery, fraud]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      MATCH (c1:Customer)-[:SHARED_IDENTIFIERS]-(c2:Customer)
      WHERE c1.customerID < c2.customerID
        AND (c1.fraudFlag = 'True' OR c2.fraudFlag = 'True')
      RETURN c1.name AS customer1,
             c1.fraudFlag AS flag1,
             c2.name AS customer2,
             c2.fraudFlag AS flag2
      LIMIT 20

  - id: "ucf-complex-002"
    question: "Which accounts received unusually large sums of money within a single month in 2025? Flag any account that received more than $10,000 in one calendar month."
    difficulty: complex
    tags: [temporal, aggregation, fraud, with]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      MATCH (a:Account)<-[:RECEIVED]-(t:Transaction)
      WHERE t.date.year = 2025
      WITH a, t.date.month AS month, sum(t.amount) AS monthlyTotal
      WHERE monthlyTotal > 10000
      RETURN a.accountNumber AS accountNumber,
             a.accountType AS accountType,
             month,
             monthlyTotal
      ORDER BY monthlyTotal DESC

  - id: "ucf-complex-003"
    question: "Are there customers in the same fraud network cluster who are also sharing phone numbers or email addresses with each other? This could indicate coordinated activity."
    difficulty: complex
    tags: [community, shared-identifiers, fraud, collect]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      MATCH (c1:Customer)-[:USES_PHONE]->(p:PhoneNumber)<-[:USES_PHONE]-(c2:Customer)
      WHERE c1.customerID < c2.customerID
        AND c1.louvainCommunity = c2.louvainCommunity
      RETURN c1.name AS customer1,
             c2.name AS customer2,
             c1.louvainCommunity AS community,
             'phone' AS sharedType
      UNION
      MATCH (c1:Customer)-[:USES_EMAIL]->(e:Email)<-[:USES_EMAIL]-(c2:Customer)
      WHERE c1.customerID < c2.customerID
        AND c1.louvainCommunity = c2.louvainCommunity
      RETURN c1.name AS customer1,
             c2.name AS customer2,
             c1.louvainCommunity AS community,
             'email' AS sharedType

  - id: "ucf-complex-004"
    question: "For money transfer transactions, can you trace the flow of funds — showing which account sent money, which transaction carried it, and which account received it? Show the largest transfers first."
    difficulty: complex
    tags: [search, fulltext, traversal, money-flow]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      CALL db.index.fulltext.queryNodes('transactionTypes', 'Transfer') YIELD node AS t, score
      MATCH (sender:Account)-[:SENT]->(t)-[:TRANSACTED_TO]->(receiver:Account)
      RETURN t.transactionID AS transactionID,
             t.amount AS amount,
             t.date AS date,
             sender.accountNumber AS fromAccount,
             receiver.accountNumber AS toAccount,
             score
      ORDER BY t.amount DESC
      LIMIT 20

  # ---------------------------------------------------------------------------
  # EXPERT (5 cases) — SEARCH clause, CALL IN TRANSACTIONS, ALL SHORTEST, deep QPE
  # ---------------------------------------------------------------------------
  - id: "ucf-expert-001"
    question: "Find all customers named Michael. Are any of them flagged for fraud, and which fraud network cluster do they belong to?"
    difficulty: expert
    tags: [search, fulltext, ga-2026, fraud]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 15000
    cypher: |
      CYPHER 25
      MATCH (c:Customer)
      WHERE c.name STARTS WITH 'Michael'
      RETURN c.name AS name,
             c.fraudFlag AS fraudFlag,
             c.louvainCommunity AS community,
             c.pagerank AS pagerank
      ORDER BY c.pagerank DESC

  - id: "ucf-expert-002"
    question: "Among the most influential customers in our network, which pairs are most directly connected through shared identity links? Show the tightest connections first."
    difficulty: expert
    tags: [all-shortest, qpe, fraud-ring, paths]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      MATCH (a:Customer), (b:Customer)
      WHERE a.pagerank > 0.5 AND b.pagerank > 0.5
        AND a.customerID < b.customerID
      WITH a, b LIMIT 5
      MATCH p = ALL SHORTEST (a)-[:SHARED_IDENTIFIERS*1..4]-(b)
      RETURN a.name AS from,
             b.name AS to,
             length(p) AS pathLength,
             count(p) AS numPaths
      LIMIT 10

  - id: "ucf-expert-003"
    question: "Are there active accounts sending money through multiple intermediate accounts before reaching a destination — a pattern that could indicate layering in money laundering? Show account pairs with multiple such routing paths."
    difficulty: expert
    tags: [qpe, money-laundering, traversal, deep-path]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      MATCH (start:Account)
      WHERE start.status = 'Active'
      MATCH p = (start) (()-[:TRANSACTED_TO]->()){2,4} (end:Account)
      WHERE start.accountNumber <> end.accountNumber
      WITH start, end, count(p) AS pathCount
      WHERE pathCount > 1
      RETURN start.accountNumber AS startAccount,
             end.accountNumber AS endAccount,
             pathCount
      ORDER BY pathCount DESC
      LIMIT 20

  - id: "ucf-expert-004"
    question: "Mark all customers who belong to the same network cluster as known fraudsters as 'suspicious due to network association'. Process them in small batches to avoid overloading the system."
    difficulty: expert
    tags: [call-in-transactions, batch, write, fraud-flagging]
    database: neo4j
    domain: ucfraud
    is_write_query: true
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 60000
    cypher: |
      CYPHER 25
      MATCH (fraudCustomer:Customer {fraudFlag: 'True'})
      WITH collect(fraudCustomer.louvainCommunity) AS fraudCommunities
      MATCH (suspect:Customer)
      WHERE suspect.louvainCommunity IN fraudCommunities
        AND suspect.fraudFlag <> 'True'
      CALL (suspect) {
        SET suspect.suspicionFlag = 'community-association'
      } IN TRANSACTIONS OF 10 ROWS
      RETURN count(suspect) AS flaggedCount

  - id: "ucf-expert-005"
    question: "Search for customers with the surname 'Poole' and trace which other customers in our system are linked to them — directly or through up to three degrees of shared identity."
    difficulty: expert
    tags: [fulltext, qpe, fraud-ring, hybrid]
    database: neo4j
    domain: ucfraud
    min_results: 1
    max_db_hits: 500000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    cypher: |
      CYPHER 25
      CALL db.index.fulltext.queryNodes('customerNames', 'Poole') YIELD node AS c, score
      MATCH (c) ((x)-[:SHARED_IDENTIFIERS]-(y)){1,3} (connected:Customer)
      WHERE c.customerID <> connected.customerID
      RETURN c.name AS customerName,
             connected.name AS connectedCustomer,
             score
      ORDER BY score DESC
      LIMIT 20

