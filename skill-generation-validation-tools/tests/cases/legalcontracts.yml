# legalcontracts.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: legalcontracts-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: legalcontracts
  database: legalcontracts
  neo4j_version: "2026.01"
  cypher_version: "25"
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: legalcontracts
  description: |
    A legal contract knowledge graph covering commercial contracts between business parties. Each
    contract has a type (Service, Strategic Alliance, License Agreement, etc.), an effective date,
    optional monetary value, optional duration, governing law jurisdiction, and associated clauses.
    Use to explore contract portfolios, party relationships, clause patterns, jurisdiction exposure,
    and contract value analysis. Contains 510 contracts, 1,152 parties, 683 clauses, and 1,541
    locations. A vector index supports semantic search on contract summaries.
  schema:
    nodes:
      Contract:
        description: "A commercial contract between parties"
        properties:
          file_id:        {type: STRING, description: "Source file identifier"}
          contract_type:  {type: STRING, values: ["Service", "Strategic Alliance", "License Agreement", "Distributor", "Joint Venture", "Sponsorship", "Endorsement", "Maintenance", "IP", "Affiliate AgreementDevelopment", "Non-Disclosure Agreement", "Employment"], description: "Type of commercial agreement"}
          effective_date: {type: DATE, sample: ["2019-01-01", "2020-04-07", "2015-06-15"], description: "Date the contract takes effect"}
          end_date:       {type: DATE, description: "Contract expiry date (sparse — many contracts are open-ended)"}
          total_amount:   {type: FLOAT, description: "Total contract value in USD (sparse — many contracts have no fixed amount)"}
          duration:       {type: STRING, description: "ISO 8601 duration string (e.g. 'P6M' for 6 months, 'P12M' for 1 year; sparse)"}
          summary:        {type: STRING, description: "Plain-language summary of the contract"}
          contract_scope: {type: STRING, description: "Description of what the contract covers"}
          embedding:      {type: VECTOR, dimensions: 1536, description: "Embedding of the contract summary for semantic similarity search"}
      Party:
        description: "A business or legal entity that is a signatory to one or more contracts"
        properties:
          name: {type: STRING, sample: ["HONEYWELL INTERNATIONAL INC.", "UBS ONCOLOGY IMPACT FUND L.P.", "MPM ONCOLOGY IMPACT MANAGEMENT LP"], description: "Legal entity name — often in UPPER CASE"}
      Location:
        description: "A jurisdiction or geographic location associated with governing law"
        properties:
          country: {type: STRING, sample: ["US", "UK", "CA"], description: "2-letter ISO country code"}
          state:   {type: STRING, sample: ["NY", "CA", "DE", "MA", "New Jersey", "Indiana"], description: "State or province name (may be full name or abbreviation)"}
          city:    {type: STRING, description: "City name (sparse)"}
          address: {type: STRING, description: "Full address (sparse)"}
      Clause:
        description: "A clause within a contract"
        properties:
          type:    {type: STRING, values: ["Renewal & Termination", "Confidentiality & Non-Disclosure", "Liability & Indemnification", "Non-Compete & Exclusivity", "Service-Level Agreements"], description: "Legal category of the clause"}
          summary: {type: STRING, description: "Plain-language summary of the clause content"}
    relationships:
      - type: PARTY_TO
        from: Party
        to: Contract
        description: "Party is a signatory to this contract (Party)-[:PARTY_TO]->(Contract)"
      - type: HAS_CLAUSE
        from: Contract
        to: Clause
        description: "Contract contains this clause"
      - type: HAS_GOVERNING_LAW
        from: Contract
        to: Location
        description: "Contract is governed by the law of this jurisdiction"
      - type: HAS_LOCATION
        from: Party
        to: Location
        description: "Party is located in this jurisdiction (sparse)"
    indexes:
      - name: contractSummary
        type: VECTOR
        on: Contract(embedding)
        dimensions: 1536
        similarity: cosine
        call: "CALL db.index.vector.queryNodes('contractSummary', N, $vec) YIELD node, score"
        description: "Vector similarity search on contract summaries"
  notes:
    - "PARTY_TO direction: (Party)-[:PARTY_TO]->(Contract) — NOT (Contract)-[:PARTY_TO]->(Party)"
    - "total_amount is sparse — many contracts have null. Use IS NOT NULL when filtering by amount."
    - "duration is stored as ISO 8601 string (e.g. 'P6M', 'P12M', 'P1Y') — not a Neo4j Duration type"
    - "effective_date is a DATE type — use date comparison: c.effective_date >= date('2020-01-01')"
    - "Party names are typically in UPPER CASE — use CONTAINS or toLower() for flexible matching"
    - "Contract types are exact strings — use full values from the values list above"
    - "Clause types: exactly 5 distinct values as listed in the type values list"
    - "Vector search: use CALL db.index.vector.queryNodes('contractSummary', N, $vec) YIELD node AS c, score — SEARCH clause is NOT available (server is 2026.01.x)"

