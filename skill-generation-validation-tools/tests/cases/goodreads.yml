# goodreads.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: goodreads-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: goodreads
  database: goodreads
  neo4j_version: "2026.01"
  cypher_version: "25"
  capabilities: [gds, apoc, apoc-extended, genai]
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: goodreads
  description: |
    A book recommendation knowledge graph from Goodreads containing books, authors, reviews,
    and readers. Use to explore author catalogues, reader reviews and ratings, book similarity
    networks, and reading preferences. Covers 10,000 books, 12,371 authors, 69,791 reviews,
    and 44,827 users. Two vector indexes support semantic similarity search on book descriptions
    and review text.
  schema:
    nodes:
      Book:
        description: "A book in the Goodreads catalogue"
        properties:
          book_id:        {type: STRING, description: "Goodreads internal book identifier"}
          title:          {type: STRING, sample: ["The Name of the Wind (The Kingkiller Chronicle, #1)", "To Kill a Mockingbird", "Harry Potter and the Sorcerer's Stone", "Betrayed (House of Night, #2)"], description: "NOTE: 'The Hunger Games' and 'Divergent' do NOT exist in this dataset. Use verified titles such as 'The Name of the Wind (The Kingkiller Chronicle, #1)' (416634 ratings) or 'Betrayed (House of Night, #2)' (206646 ratings)."}
          average_rating: {type: FLOAT, min: 0.0, max: 5.0, description: "Average reader rating on a 0–5 scale"}
          ratings_count:  {type: INTEGER, description: "Total number of ratings received"}
          text_reviews_count: {type: INTEGER, description: "Total number of text reviews"}
          publication_year: {type: STRING, description: "Year published as a string (e.g. '2009')"}
          language_code:  {type: STRING, sample: ["eng", "en-US", "fre", "spa"], description: "ISO language code (sparse — many books have null)"}
          publisher:      {type: STRING, description: "Publisher name (sparse)"}
          num_pages:      {type: INTEGER, description: "Page count (sparse)"}
          is_ebook:       {type: STRING, values: ["true", "false"], description: "Whether this edition is digital"}
          format:         {type: STRING, sample: ["Hardcover", "Paperback", "Mass Market Paperback", "Kindle Edition"]}
          embedding:      {type: VECTOR, dimensions: 1536, similarity: cosine, description: "Book description embedding for semantic search"}
      Author:
        description: "A book author"
        properties:
          author_id:          {type: STRING, description: "Goodreads internal author identifier"}
          name:               {type: STRING, sample: ["Stephen King", "J.K. Rowling", "Suzanne Collins"]}
          average_rating:     {type: STRING, description: "Average rating across all the author's books (stored as string)"}
          ratings_count:      {type: STRING, description: "Total ratings across all author's books (stored as string)"}
          text_reviews_count: {type: STRING, description: "Total text reviews across author's books (stored as string)"}
      Review:
        description: "A reader review of a book"
        properties:
          review_id:  {type: STRING}
          rating:     {type: INTEGER, values: [0, 1, 2, 3, 4, 5], description: "Reader rating from 0 (unrated) to 5 stars"}
          n_votes:    {type: INTEGER, description: "Number of helpful votes on the review"}
          n_comments: {type: INTEGER, description: "Number of comments on the review"}
          text:       {type: STRING, description: "Review text content"}
          date_added: {type: STRING, description: "Date review was added (string format)"}
          embedding:  {type: VECTOR, dimensions: 1536, similarity: cosine, description: "Review text embedding for semantic search"}
      User:
        description: "A Goodreads user who has written reviews"
        properties:
          user_id: {type: STRING, description: "Goodreads internal user identifier"}
    relationships:
      - type: AUTHORED
        from: Author
        to: Book
        description: "Author wrote this book (one author may have written many books)"
      - type: PUBLISHED
        from: User
        to: Review
        description: "User published this review"
      - type: WRITTEN_FOR
        from: Review
        to: Book
        description: "This review is written for the book"
      - type: SIMILAR_TO
        from: Book
        to: Book
        description: "Two books are similar (based on reader co-ratings) — sparse network: max 2 SIMILAR_TO relationships per book. Use >= 1 or >= 2 (not >= 3) when filtering by similarity count."
    indexes:
      - name: book-descriptions
        type: VECTOR
        on: Book(embedding)
        dimensions: 1536
        similarity: cosine
        call: "CALL db.index.vector.queryNodes('book-descriptions', N, $vec) YIELD node, score"
        description: "Vector similarity search on book descriptions"
      - name: review-text
        type: VECTOR
        on: Review(embedding)
        dimensions: 1536
        similarity: cosine
        call: "CALL db.index.vector.queryNodes('review-text', N, $vec) YIELD node, score"
        description: "Vector similarity search on review content"
  notes:
    - "Review ratings: 0=unrated, 1–5 stars. Many reviews have rating=0 (unrated shelves)."
    - "publication_year is stored as STRING (e.g. '2009'), not an integer — use string comparison or toInteger()"
    - "average_rating on Author is also STRING — use toFloat() to compare"
    - "language_code is sparse — many books have null. Use IS NOT NULL when filtering by language."
    - "SIMILAR_TO is directed: (b1:Book)-[:SIMILAR_TO]->(b2:Book) — but for traversal use UNDIRECTED pattern (()-[:SIMILAR_TO]-(:Book)) to find all reachable books regardless of direction. Max 2 outgoing per book, but many books have only incoming links."
    - "User connects to Review via PUBLISHED; Review connects to Book via WRITTEN_FOR — two hops to get user's reviewed books"
    - "Vector search: use CALL db.index.vector.queryNodes('book-descriptions', N, $vec) YIELD node, score — the SEARCH clause is NOT valid Cypher 25 syntax"
    - "Labels Genre, Publisher, and Series do NOT exist in this dataset — do not reference them"
    - "Books confirmed to exist: 'The Name of the Wind (The Kingkiller Chronicle, #1)', 'Betrayed (House of Night, #2)', 'To Kill a Mockingbird', 'Harry Potter and the Sorcerer\\'s Stone', 'Night Visions 5', 'The Tommyknockers', 'The Berlin Stories: The Last of Mr Norris/Goodbye to Berlin'"
    - "Books that do NOT exist: 'The Hunger Games', 'Divergent' — do not use these in test queries"
    - "SIMILAR_TO network: 'The Name of the Wind' and 'Betrayed (House of Night #2)' have 0 SIMILAR_TO links — do NOT use them in path traversal queries. Use 'Night Visions 5' (6 neighbors) or 'The Berlin Stories' (7 neighbors) instead."
    - "SIMILAR_TO is very sparse: most books have 0 links. Use the confirmed books above for path/traversal test cases."

