  - id: rec-extra-007
    question: "For each movie language, what is the average IMDb rating? Show me how English, French, and other language films compare."
    database: recommendations
    difficulty: advanced
    tags: [match, filter, aggregation, avg, list-property, unwind]
    domain: recommendations
    min_results: 1
    max_db_hits: 100000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 10000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (m:Movie)
      WHERE m.languages IS NOT NULL AND m.imdbRating IS NOT NULL
      UNWIND m.languages AS lang
      WITH lang, avg(m.imdbRating) AS avgRating, count(DISTINCT m) AS movieCount
      WHERE movieCount >= 5
      RETURN lang AS language, round(avgRating, 2) AS avgImdbRating, movieCount
      ORDER BY movieCount DESC
      LIMIT 20

  - id: rec-extra-008
    question: "Find movies that received lower user ratings than their IMDb score would suggest — the biggest gaps between community user ratings and IMDb ratings."
    database: recommendations
    difficulty: advanced
    tags: [match, aggregation, avg, filter, order-by]
    domain: recommendations
    min_results: 1
    max_db_hits: 300000
    max_allocated_memory_bytes: 31457280
    max_runtime_ms: 15000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (u:User)-[r:RATED]->(m:Movie)
      WHERE m.imdbRating IS NOT NULL
      WITH m, avg(r.rating) AS avgUserRating, count(r) AS ratingCount
      WHERE ratingCount >= 5
      WITH m, avgUserRating, ratingCount,
           m.imdbRating / 2.0 AS imdbNormalized
      WITH m, avgUserRating, ratingCount, imdbNormalized,
           (imdbNormalized - avgUserRating) AS gap
      WHERE gap > 0.5
      RETURN m.title AS title, round(m.imdbRating, 1) AS imdbRating,
             round(avgUserRating, 2) AS avgUserRating,
             ratingCount, round(gap, 2) AS ratingGap
      ORDER BY gap DESC
      LIMIT 15

