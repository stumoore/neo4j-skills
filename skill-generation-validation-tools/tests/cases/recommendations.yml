  - id: rec-extra-002
    question: "What is the average movie budget by decade for films released since 1980?"
    database: recommendations
    difficulty: intermediate
    tags: [match, temporal, aggregation, avg, group-by]
    domain: recommendations
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 10485760
    max_runtime_ms: 8000
    is_write_query: false
    notes: "budget is INTEGER (USD); decade computed from released STRING; filter IS NOT NULL"
    cypher: |
      CYPHER 25
      MATCH (m:Movie)
      WHERE m.budget IS NOT NULL AND m.released >= '1980-01-01'
      WITH (toInteger(substring(m.released, 0, 4)) / 10) * 10 AS decade,
           avg(m.budget) AS avgBudget, count(m) AS movieCount
      RETURN toString(decade) + 's' AS decade, round(avgBudget) AS avgBudget, movieCount
      ORDER BY decade

