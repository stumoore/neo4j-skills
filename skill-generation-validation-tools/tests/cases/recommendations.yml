  - id: rec-extra-013
    question: "What movies share a cast member with both The Matrix and Pulp Fiction? Find the connecting actors and the films they appeared in."
    database: recommendations
    difficulty: complex
    tags: [match, relationship, filter, intersection, multi-hop]
    domain: recommendations
    min_results: 0
    max_db_hits: 500000
    max_allocated_memory_bytes: 52428800
    max_runtime_ms: 20000
    is_write_query: false
    notes: "The Matrix stored as 'Matrix, The'; Pulp Fiction has no article inversion"
    cypher: |
      CYPHER 25
      MATCH (p:Person)-[:ACTED_IN]->(matrix:Movie {title: 'Matrix, The'})
      MATCH (p)-[:ACTED_IN]->(pulp:Movie {title: 'Pulp Fiction'})
      MATCH (p)-[:ACTED_IN]->(shared:Movie)
      WHERE shared <> matrix AND shared <> pulp
      RETURN p.name AS connectingActor, collect(DISTINCT shared.title) AS otherMovies

  - id: rec-extra-014
    question: "Show the complete cast and crew for the movie Inception."
    database: recommendations
    difficulty: intermediate
    tags: [match, relationship, filter, collect]
    domain: recommendations
    min_results: 1
    max_db_hits: 20000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 5000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (m:Movie {title: 'Inception'})
      WITH m,
           COLLECT { MATCH (p:Person)-[:ACTED_IN]->(m) RETURN p.name } AS cast,
           COLLECT { MATCH (p:Person)-[:DIRECTED]->(m) RETURN p.name } AS directors
      RETURN m.title AS title, directors, cast
