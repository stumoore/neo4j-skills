      MATCH (m:Movie)-[:IN_GENRE]->(g1:Genre), (m)-[:IN_GENRE]->(g2:Genre)
      WHERE g1.name < g2.name
      WITH g1, g2, count(DISTINCT m) AS coOccurrences
      WHERE coOccurrences >= 5
