  - id: rec-complex-005
    question: "Build a full movie profile: for each of the top 5 highest-rated movies, show the cast, director, genres, and average user rating in a single result."
    database: recommendations
    difficulty: complex
    tags: [collect-subquery, aggregation, avg, relationship, multi-hop]
