      MATCH (kevin:Person {name: 'Kevin Bacon'}), (tom:Person {name: 'Tom Hanks'})
      MATCH path = ALL SHORTEST (kevin)-[:ACTED_IN]->(m:Movie)<-[:ACTED_IN]-(tom)
      RETURN [n IN nodes(path) WHERE n:Movie | n.title] AS sharedMovies,
             length(path) AS pathLength
      LIMIT 10

  - id: rec-expert-008
    question: "For the 3 most popular genres (by total ratings), rank all movies in each genre by their community score (weighted: 60% average user rating + 40% IMDb rating). Show the top 5 in each genre."
    database: recommendations
    difficulty: expert
    tags: [collect-subquery, aggregation, avg, order-by, limit, relationship, scoring, genre]
    domain: recommendations
    min_results: 3
    max_db_hits: 1000000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (u:User)-[r:RATED]->(m:Movie)-[:IN_GENRE]->(g:Genre)
      WITH g, count(r) AS totalRatings
      ORDER BY totalRatings DESC
      LIMIT 3
      WITH collect(g) AS topGenres
      UNWIND topGenres AS genre
      WITH genre,
           COLLECT {
             MATCH (m2:Movie)-[:IN_GENRE]->(genre)
             OPTIONAL MATCH (u2:User)-[r2:RATED]->(m2)
             WITH m2, avg(r2.rating) AS avgUser, m2.imdbRating AS imdb
             WHERE avgUser IS NOT NULL AND imdb IS NOT NULL
             RETURN m2.title
             ORDER BY (0.6 * avgUser + 0.4 * imdb) DESC
             LIMIT 5
           } AS topMovies
      RETURN genre.name AS genre, topMovies

  - id: rec-expert-009
    question: "Using the fulltext index, find movies whose plot descriptions contain themes of 'artificial intelligence' or 'robot'. Then for each result, find the top 3 actors who have starred in the most similar-themed films."
    database: recommendations
    difficulty: expert
    tags: [fulltext, index, match, relationship, aggregation, count, multi-hop]
