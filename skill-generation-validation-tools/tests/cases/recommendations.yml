  - id: rec-expert-010
    question: "Build an end-to-end recommendation pipeline for the member with ID 1: find peer members with the most shared high-rated movies, get candidate films those peers rated highly that the member with ID 1 hasn't seen, score by peer support and category affinity, and return the top 5 with an explanation of the recommendation reason."
    database: recommendations
    difficulty: expert
    tags: [match, collaborative-filtering, genre-overlap, aggregation, filter, scoring, not-exists, order-by, limit, call-subquery]
    domain: recommendations
    min_results: 1
    max_db_hits: 2000000
    max_allocated_memory_bytes: 209715200
    max_runtime_ms: 60000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (target:User {userId: '1'})-[r1:RATED]->(seen:Movie)<-[r2:RATED]-(peer:User)
      WHERE target <> peer AND r1.rating >= 4 AND r2.rating >= 4
      WITH target, peer, count(DISTINCT seen) AS sharedHighRated
      ORDER BY sharedHighRated DESC
      LIMIT 20
      MATCH (peer)-[rp:RATED]->(candidate:Movie)
      WHERE rp.rating >= 4
        AND NOT EXISTS { (target)-[:RATED]->(candidate) }
      WITH target, candidate,
           count(DISTINCT peer) AS peerSupport,
           avg(rp.rating) AS avgPeerRating
      OPTIONAL MATCH (target)-[rt:RATED]->(seenM:Movie)-[:IN_GENRE]->(g:Genre)<-[:IN_GENRE]-(candidate)
      WITH candidate, peerSupport, avgPeerRating, count(DISTINCT g) AS genreOverlap
      WITH candidate,
           (2.0 * peerSupport + 1.0 * genreOverlap) AS score,
           peerSupport, avgPeerRating, genreOverlap
      ORDER BY score DESC
      LIMIT 5
      WITH candidate, score, peerSupport, avgPeerRating, genreOverlap,
           COLLECT { MATCH (candidate)-[:IN_GENRE]->(g:Genre) RETURN g.name } AS genres
      RETURN candidate.title AS title,
             genres,
             peerSupport,
             round(avgPeerRating, 2) AS avgPeerRating,
             genreOverlap,
             round(score, 2) AS score

