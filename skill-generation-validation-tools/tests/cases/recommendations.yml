    cypher: |
      CYPHER 25
      MATCH (m:Movie)-[:IN_GENRE]->(g:Genre {name: 'Thriller'})
      WHERE m.released > '2010-01-01' AND m.imdbRating >= 7.0
      RETURN m.title AS title, m.released AS released, m.imdbRating AS imdbRating
      ORDER BY m.imdbRating DESC, m.released DESC
      LIMIT 20

  - id: rec-extra-004
    question: "Which genre has the most movies released in each decade from 1980 onwards? Show the dominant genre per decade."
    database: recommendations
    difficulty: advanced
    tags: [match, temporal, aggregation, count, group-by, order-by, relationship]
    domain: recommendations
    min_results: 1
    max_db_hits: 200000
    max_allocated_memory_bytes: 20971520
    max_runtime_ms: 15000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (m:Movie)-[:IN_GENRE]->(g:Genre)
      WHERE m.released >= '1980-01-01'
      WITH (toInteger(substring(m.released, 0, 4)) / 10) * 10 AS decade,
           g.name AS genre, count(m) AS cnt
      WITH decade, genre, cnt
      ORDER BY decade, cnt DESC
      WITH decade, collect({genre: genre, cnt: cnt})[0] AS topEntry
      RETURN toString(decade) + 's' AS decade, topEntry.genre AS dominantGenre, topEntry.cnt AS movieCount
      ORDER BY decade

  - id: rec-extra-005
    question: "What is the average IMDb rating for movies that were big box-office successes (revenue over 200 million dollars)?"
    database: recommendations
    difficulty: intermediate
    tags: [match, filter, aggregation, avg]
    domain: recommendations
    min_results: 1
    max_db_hits: 50000
    max_allocated_memory_bytes: 5242880
    max_runtime_ms: 5000
    is_write_query: false
    notes: "casual 'big box-office successes' → revenue > 200000000; both revenue and imdbRating may be null"
    cypher: |
      CYPHER 25
      MATCH (m:Movie)
      WHERE m.revenue > 200000000 AND m.imdbRating IS NOT NULL
      RETURN avg(m.imdbRating) AS avgImdbRating, count(m) AS movieCount

  - id: rec-extra-006
    question: "List all movies in our catalogue that star both an actor and their director — films where the same person directed and also appeared in the cast."
    database: recommendations
    difficulty: advanced
    tags: [match, filter, exists, relationship]
    domain: recommendations
    min_results: 1
