    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (tom:Person {name: 'Tom Hanks'})
      MATCH (tom)((:Person)-[:ACTED_IN]->(:Movie)<-[:ACTED_IN]-(:Person)){1,2}(colleague:Person)
      WHERE colleague <> tom
      RETURN DISTINCT colleague.name AS actor
      ORDER BY colleague.name
      LIMIT 50

  - id: rec-complex-008
    question: "Which genres are most frequently recommended together? Find pairs of genres that appear together in the same movie most often."
    database: recommendations
