  - id: rec-expert-007
    question: "Which movies have Kevin Bacon in common with Tom Hanks — movies they've both appeared in, or movies connected by shared cast members up to 2 hops away?"
    database: recommendations
    difficulty: expert
    tags: [shortest-path, qpe, match, relationship, path, multi-hop]
    domain: recommendations
    min_results: 1
    max_db_hits: 1000000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    is_write_query: false
    cypher: |
