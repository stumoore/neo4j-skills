  - id: rec-complex-009
    question: "For the member with ID 1, find a personalised watchlist: movies from their favourite film categories (top 3 categories they've rated highly) that they haven't seen yet, sorted by average community rating."
    database: recommendations
    difficulty: complex
    tags: [match, aggregation, filter, not-exists, order-by, collaborative-filtering, genre]
    domain: recommendations
    min_results: 1
    max_db_hits: 1000000
    max_allocated_memory_bytes: 104857600
    max_runtime_ms: 30000
    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (target:User {userId: '1'})-[r:RATED]->(m:Movie)-[:IN_GENRE]->(g:Genre)
      WHERE r.rating >= 4
      WITH target, g, avg(r.rating) AS genreScore
      ORDER BY genreScore DESC
      LIMIT 3
      WITH target, collect(g) AS favGenres
      UNWIND favGenres AS fg
      MATCH (candidate:Movie)-[:IN_GENRE]->(fg)
      WHERE NOT EXISTS { (target)-[:RATED]->(candidate) }
      WITH DISTINCT candidate, target
      OPTIONAL MATCH (u:User)-[r2:RATED]->(candidate)
      WITH candidate, avg(r2.rating) AS communityRating, count(r2) AS numRatings
      WHERE numRatings >= 3
      RETURN candidate.title AS title, round(communityRating, 2) AS communityRating, numRatings
      ORDER BY communityRating DESC
      LIMIT 15

