    cypher: |
      CYPHER 25
      MATCH (m:Movie)
      WHERE m.imdbRating IS NOT NULL
      WITH m
      ORDER BY m.imdbRating DESC
      LIMIT 5
      WITH m,
           COLLECT { MATCH (p:Person)-[:ACTED_IN]->(m) RETURN p.name LIMIT 5 } AS cast,
           COLLECT { MATCH (p:Person)-[:DIRECTED]->(m) RETURN p.name } AS directors,
           COLLECT { MATCH (m)-[:IN_GENRE]->(g:Genre) RETURN g.name } AS genres
      OPTIONAL MATCH (u:User)-[r:RATED]->(m)
      WITH m, cast, directors, genres, avg(r.rating) AS avgUserRating
      RETURN m.title AS title, m.imdbRating AS imdbRating,
             avgUserRating, directors, cast, genres

  - id: rec-complex-006
    question: "Create a user similarity matrix: for each pair of users who share at least 5 rated movies, calculate their similarity score (number of shared movies). Show the top 20 most similar pairs."
    database: recommendations
    difficulty: complex
    tags: [match, aggregation, count, filter, pairs]
    domain: recommendations
