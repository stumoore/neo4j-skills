    is_write_query: false
    cypher: |
      CYPHER 25
      MATCH (u1:User)-[:RATED]->(m:Movie)<-[:RATED]-(u2:User)
      WHERE u1.userId < u2.userId
      WITH u1, u2, count(DISTINCT m) AS sharedMovies
      WHERE sharedMovies >= 5
      RETURN u1.name AS user1, u2.name AS user2, sharedMovies
      ORDER BY sharedMovies DESC
      LIMIT 20

  - id: rec-complex-007
    question: "Show a network of actor collaborations: starting from Tom Hanks, find actors who co-starred with him, then find actors those people co-starred with — two degrees out. Show all unique actors at each degree."
    database: recommendations
    difficulty: complex
