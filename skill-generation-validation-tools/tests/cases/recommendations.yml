    cypher: |
      CYPHER 25
      CALL db.index.fulltext.queryNodes('movieFulltext', 'artificial intelligence robot') YIELD node AS m, score
      WITH m, score
      ORDER BY score DESC
      LIMIT 5
      CALL (m) {
        MATCH (p:Person)-[:ACTED_IN]->(m)
